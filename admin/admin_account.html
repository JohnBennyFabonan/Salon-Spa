<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Admin Account Settings</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--green:#2f7d62;
--green2:#256a52;
--bg:#f4fbf7;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
--line:rgba(15,23,42,.08);
--shadow:0 14px 40px rgba(2,6,23,.08);
--radius:16px;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:Poppins;
background:var(--bg);
display:flex;
color:var(--text);
}

/* SIDEBAR */

.sidebar{
width:260px;
background:linear-gradient(180deg,var(--green),var(--green2));
color:white;
padding:28px 22px;
min-height:100vh;
}

.logo{
font-weight:800;
font-size:18px;
margin-bottom:35px;
}

.nav{
display:flex;
flex-direction:column;
gap:6px;
}

.nav a{
display:block;
color:white;
text-decoration:none;
padding:12px 14px;
border-radius:12px;
font-size:13px;
font-weight:600;
transition:.15s;
}

.nav a:hover{
background:rgba(255,255,255,.15);
}

.nav a.active{
background:rgba(255,255,255,.25);
}

/* MAIN */

.main{
flex:1;
padding:30px;
max-width:900px;
}

/* HEADER */

.header{
margin-bottom:25px;
}

.header h1{
margin:0;
font-size:28px;
}

/* CARD */

.tableCard{
background:var(--card);
padding:25px;
border-radius:var(--radius);
box-shadow:var(--shadow);
border:1px solid var(--line);
}

/* FORM */

.settingsForm{
max-width:500px;
}

.formGroup{
display:flex;
flex-direction:column;
margin-bottom:15px;
}

.formGroup label{
font-size:13px;
font-weight:600;
margin-bottom:6px;
color:var(--muted);
}

.formGroup input{
padding:10px;
border-radius:8px;
border:1px solid var(--line);
font-family:Poppins;
font-size:13px;
}

.formGroup input:focus{
outline:none;
border-color:var(--green);
}

/* BUTTON */

.saveBtn{
background:var(--green);
color:white;
border:none;
padding:10px 16px;
border-radius:10px;
font-size:13px;
font-weight:600;
cursor:pointer;
transition:.15s;
}

.saveBtn:hover{
background:var(--green2);
}

/* MOBILE */

@media(max-width:900px){

.sidebar{
display:none;
}

body{
flex-direction:column;
}

.main{
padding:20px;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">🌿 BASIT Admin</div>

<div class="nav">

<a href="admin_dashboard.html">Dashboard</a>
<a href="admin_gallery.html">Manage Gallery</a>
<a href="admin_bookings.html">Manage Bookings</a>
<a href="admin_promo.html">Manage Promo</a>
<a href="admin_services.html">Manage Services</a>
<a href="admin_specialist.html">Manage Specialist</a>
<a href="admin_manageaccount.html">Manage Account</a>
<a class="active">Account Settings</a>
<a href="logout.html">Log Out</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">
<h1>Account Settings</h1>
</div>

<div class="tableCard">

<form class="settingsForm" id="settingsForm">

<div class="formGroup">
<label>Admin Name</label>
<input type="text" id="adminName">
</div>

<div class="formGroup">
<label>Email</label>
<input type="email" id="adminEmail">
</div>

<div class="formGroup">
<label>Change Password</label>
<input type="password" id="adminPassword" placeholder="Enter new password">
</div>

<button class="saveBtn">Save Changes</button>

</form>

</div>

</div>

<script src="session.js"></script>

<script>

/* ===============================
LOAD ADMIN DATA
=============================== */

let adminData = JSON.parse(localStorage.getItem("adminAccount"));

/* If no admin account exists create default */

if(!adminData){

adminData = {
name:"Admin",
email:"admin@gmail.com",
password:"admin123"
};

localStorage.setItem("adminAccount",JSON.stringify(adminData));

}

/* Fill inputs */

document.getElementById("adminName").value = adminData.name;
document.getElementById("adminEmail").value = adminData.email;


/* ===============================
SAVE SETTINGS
=============================== */

document.getElementById("settingsForm").addEventListener("submit",function(e){

e.preventDefault();

const newName = document.getElementById("adminName").value.trim();
const newEmail = document.getElementById("adminEmail").value.trim();
const newPassword = document.getElementById("adminPassword").value.trim();

/* Update name and email */

adminData.name = newName;
adminData.email = newEmail;

/* Update password only if entered */

if(newPassword !== ""){
adminData.password = newPassword;
}

/* Save to localStorage */

localStorage.setItem("adminAccount",JSON.stringify(adminData));

alert("Account updated successfully.");

});

</script>

</body>
</html>
