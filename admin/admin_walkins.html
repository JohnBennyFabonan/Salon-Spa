<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Walk-ins</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--green:#2f7d62;
--green2:#256a52;
--bg:#f4fbf7;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
--line:rgba(15,23,42,.08);
--shadow:0 14px 40px rgba(2,6,23,.08);
--radius:16px;
--greenSoft:rgba(47,125,98,.12);
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:Poppins;
background:var(--bg);
display:flex;
color:var(--text);
}

/* SIDEBAR */
.sidebar{
width:260px;
background:linear-gradient(180deg,var(--green),var(--green2));
color:white;
padding:28px 22px;
min-height:100vh;
}

.logo{
font-weight:800;
font-size:18px;
margin-bottom:35px;
}

.nav{
display:flex;
flex-direction:column;
gap:6px;
}

.nav a{
display:block;
color:white;
text-decoration:none;
padding:12px 14px;
border-radius:12px;
font-size:13px;
font-weight:600;
}

.nav a:hover{
background:rgba(255,255,255,.15);
}

.nav a.active{
background:rgba(255,255,255,.25);
}

/* MAIN */
.main{
flex:1;
padding:30px;
max-width:1400px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:10px;
}

.header h1{
margin:0;
font-size:26px;
}

/* BUTTON */
.primaryBtn{
background:var(--green);
color:white;
border:none;
padding:10px 16px;
border-radius:10px;
font-size:13px;
font-weight:600;
cursor:pointer;
}

.primaryBtn:hover{
background:var(--green2);
}

/* CARD */
.tableCard{
background:var(--card);
padding:22px;
border-radius:var(--radius);
box-shadow:var(--shadow);
border:1px solid var(--line);
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
font-size:14px;
margin-top:10px;
}

thead{
background:var(--greenSoft);
}

th{
text-align:left;
font-size:12px;
color:var(--muted);
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid var(--line);
}

tr:hover{
background:#f9fdfb;
}

/* ACTION */
.actionBtn{
padding:6px 10px;
border:none;
border-radius:6px;
font-size:12px;
cursor:pointer;
margin-right:5px;
}

.editBtn{ background:#2f7d62; color:white; }
.deleteBtn{ background:#ef4444; color:white; }

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:20px;
border-radius:12px;
width:320px;
}

input, select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid var(--line);
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">🌿 BASIT Admin</div>

<div class="nav">
<a href="admin_dashboard.html">Dashboard</a>
<a href="admin_gallery.html">Manage Gallery</a>
<a class="active">Manage Walk-ins</a>
<a href="admin_bookings.html">Manage Bookings</a>
<a href="admin_promo.html">Manage Promo</a>
<a href="admin_services.html">Manage Services</a>
<a href="admin_specialist.html">Manage Specialist</a>
<a href="admin_manageaccount.html">Manage Account</a>
<a href="admin_account.html">Account Settings</a>
<a href="logout.html">Log Out</a>
</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<h1>Manage Walk-ins</h1>
<button class="primaryBtn" onclick="openModal()">+ Add Walk-in</button>
</div>

<div class="tableCard">

<!-- SEARCH -->
<div style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;">
<input type="date" id="searchDate">
<input type="text" id="searchService" placeholder="Search service...">
</div>

<table>
<thead>
<tr>
<th>Date</th>
<th>Service</th>
<th>Payment</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>

<tbody id="walkTable"></tbody>
</table>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box" style="position:relative;">

<!-- ❌ CLOSE BUTTON -->
<button onclick="closeModal()" style="
position:absolute;
top:10px;
right:12px;
background:none;
border:none;
font-size:18px;
cursor:pointer;
color:#555;
font-weight:bold;
">✖</button>

<h3 id="modalTitle" style="margin-top:0;">Add Walk-in</h3>

<input type="text" id="service" placeholder="Service">
<input type="number" id="amount" placeholder="Amount">

<select id="payment">
<option value="">Select Payment</option>
<option value="Cash">💵 Cash</option>
<option value="GCash">📱 GCash</option>
<option value="BPI">🏦 BPI</option>
<option value="Maya">📲 Maya</option>
</select>

<button class="primaryBtn" style="width:100%;" onclick="saveWalkIn()">Save</button>

</div>
</div>

<script>

/* ===============================
CONFIG
================================ */
const API_BASE = "https://salon-spa.onrender.com";

/* ===============================
🔒 ADMIN SESSION SECURITY
================================ */
function checkAdminSession(){

  const session =
  JSON.parse(localStorage.getItem("salonSession")) ||
  JSON.parse(sessionStorage.getItem("salonSession"));

  if(!session || session.role !== "admin"){
    window.location.replace("../log_in.html");
    return null;
  }

  return session;
}

checkAdminSession();

window.addEventListener("pageshow", (e)=>{
  if(e.persisted) location.reload();
  checkAdminSession();
});

document.addEventListener("visibilitychange", ()=>{
  if(document.visibilityState === "visible"){
    checkAdminSession();
  }
});

/* ===============================
📦 STATE
================================ */
let walkIns = [];
let editId = null;

/* ===============================
📥 LOAD WALK-INS (API)
================================ */
async function loadWalkIns(){
  try{

    const res = await fetch(`${API_BASE}/walkins`);

    if(!res.ok){
      throw new Error("Failed to load walk-ins");
    }

    walkIns = await res.json();
    renderTable();

  }catch(err){
    console.error("❌ Load error:", err);
  }
}

/* ===============================
📊 RENDER TABLE
================================ */
function renderTable(){

  const table = document.getElementById("walkTable");
  if(!table) return;

  table.innerHTML = "";

  const searchDate = document.getElementById("searchDate")?.value || "";
  const searchService = document.getElementById("searchService")?.value.toLowerCase() || "";

  walkIns.forEach((w)=>{

    if(searchDate && w.date !== searchDate) return;
    if(searchService && !w.service.toLowerCase().includes(searchService)) return;

    table.innerHTML += `
    <tr>
      <td>${new Date(w.date).toLocaleDateString("en-GB")}</td>
      <td>${w.service}</td>
      <td>${w.payment || "-"}</td>
      <td>₱${Number(w.amount).toLocaleString()}</td>
      <td>
        <button class="actionBtn editBtn" onclick="editWalkIn(${w.id})">Edit</button>
        <button class="actionBtn deleteBtn" onclick="deleteWalkIn(${w.id})">Delete</button>
      </td>
    </tr>
    `;
  });

  if(table.innerHTML === ""){
    table.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999;">No data found</td></tr>`;
  }
}

/* ===============================
📂 OPEN MODAL
================================ */
function openModal(){

  document.getElementById("modal").style.display = "flex";
  document.getElementById("modalTitle").innerText = "Add Walk-in";

  editId = null;

  document.getElementById("service").value = "";
  document.getElementById("amount").value = "";
  document.getElementById("payment").value = "";
}

/* ===============================
❌ CLOSE MODAL
================================ */
function closeModal(){
  document.getElementById("modal").style.display = "none";
}

window.addEventListener("click", (e)=>{
  const modal = document.getElementById("modal");
  if(e.target === modal){
    modal.style.display = "none";
  }
});

/* ===============================
💾 SAVE WALK-IN (API)
================================ */
async function saveWalkIn(){

  const service = document.getElementById("service").value.trim();
  const amount = parseFloat(document.getElementById("amount").value);
  const payment = document.getElementById("payment").value;

  if(!service) return alert("Service is required");
  if(isNaN(amount) || amount <= 0) return alert("Enter valid amount");
  if(!payment) return alert("Select payment");

  const today = new Date().toISOString().split("T")[0];

  try{

    let res;

    if(editId){

      res = await fetch(`${API_BASE}/walkins/${editId}`, {
        method:"PUT",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ service, amount, payment })
      });

    }else{

      res = await fetch(`${API_BASE}/walkins`, {
        method:"POST",
        headers:{ "Content-Type":"application/json" },
        body: JSON.stringify({ service, amount, payment, date: today })
      });

    }

    if(!res.ok){
      throw new Error("Save failed");
    }

    closeModal();
    loadWalkIns();

  }catch(err){
    console.error("❌ Save error:", err);
    alert("Failed to save walk-in");
  }
}

/* ===============================
✏️ EDIT
================================ */
function editWalkIn(id){

  const w = walkIns.find(x => x.id == id);
  if(!w) return;

  openModal();

  document.getElementById("modalTitle").innerText = "Edit Walk-in";
  document.getElementById("service").value = w.service;
  document.getElementById("amount").value = w.amount;
  document.getElementById("payment").value = w.payment || "";

  editId = id;
}

/* ===============================
🗑 DELETE
================================ */
async function deleteWalkIn(id){

  if(!confirm("Delete this walk-in?")) return;

  try{

    const res = await fetch(`${API_BASE}/walkins/${id}`, {
      method:"DELETE"
    });

    if(!res.ok){
      throw new Error("Delete failed");
    }

    loadWalkIns();

  }catch(err){
    console.error("❌ Delete error:", err);
    alert("Failed to delete");
  }
}

/* ===============================
🔎 LIVE SEARCH
================================ */
document.getElementById("searchDate")?.addEventListener("input", renderTable);
document.getElementById("searchService")?.addEventListener("input", renderTable);

/* ===============================
🚀 INIT
================================ */
loadWalkIns();

</script>

</body>
</html>
