<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Walk-ins</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--green:#2f7d62;
--green2:#256a52;
--bg:#f4fbf7;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
--line:rgba(15,23,42,.08);
--shadow:0 14px 40px rgba(2,6,23,.08);
--radius:16px;
--greenSoft:rgba(47,125,98,.12);
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:Poppins;
background:var(--bg);
display:flex;
color:var(--text);
}

/* SIDEBAR */
.sidebar{
width:260px;
background:linear-gradient(180deg,var(--green),var(--green2));
color:white;
padding:28px 22px;
min-height:100vh;
}

.logo{
font-weight:800;
font-size:18px;
margin-bottom:35px;
}

.nav{
display:flex;
flex-direction:column;
gap:6px;
}

.nav a{
display:block;
color:white;
text-decoration:none;
padding:12px 14px;
border-radius:12px;
font-size:13px;
font-weight:600;
}

.nav a:hover{
background:rgba(255,255,255,.15);
}

.nav a.active{
background:rgba(255,255,255,.25);
}

/* MAIN */
.main{
flex:1;
padding:30px;
max-width:1400px;
}

/* HEADER */
.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
flex-wrap:wrap;
gap:10px;
}

.header h1{
margin:0;
font-size:26px;
}

/* BUTTON */
.primaryBtn{
background:var(--green);
color:white;
border:none;
padding:10px 16px;
border-radius:10px;
font-size:13px;
font-weight:600;
cursor:pointer;
}

.primaryBtn:hover{
background:var(--green2);
}

/* CARD */
.tableCard{
background:var(--card);
padding:22px;
border-radius:var(--radius);
box-shadow:var(--shadow);
border:1px solid var(--line);
}

/* TABLE */
table{
width:100%;
border-collapse:collapse;
font-size:14px;
margin-top:10px;
}

thead{
background:var(--greenSoft);
}

th{
text-align:left;
font-size:12px;
color:var(--muted);
padding:12px;
}

td{
padding:12px;
border-bottom:1px solid var(--line);
}

tr:hover{
background:#f9fdfb;
}

/* ACTION */
.actionBtn{
padding:6px 10px;
border:none;
border-radius:6px;
font-size:12px;
cursor:pointer;
margin-right:5px;
}

.editBtn{ background:#2f7d62; color:white; }
.deleteBtn{ background:#ef4444; color:white; }

/* MODAL */
.modal{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.4);
align-items:center;
justify-content:center;
}

.modal-box{
background:white;
padding:20px;
border-radius:12px;
width:320px;
}

input, select{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid var(--line);
}

</style>
</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">🌿 BASIT Admin</div>

<div class="nav">
<a href="admin_dashboard.html">Dashboard</a>
<a href="admin_gallery.html">Manage Gallery</a>
<a class="active">Manage Walk-ins</a>
<a href="admin_bookings.html">Manage Bookings</a>
<a href="admin_promo.html">Manage Promo</a>
<a href="admin_services.html">Manage Services</a>
<a href="admin_specialist.html">Manage Specialist</a>
<a href="admin_manageaccount.html">Manage Account</a>
<a href="admin_account.html">Account Settings</a>
<a href="logout.html">Log Out</a>
</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<h1>Manage Walk-ins</h1>
<button class="primaryBtn" onclick="openModal()">+ Add Walk-in</button>
</div>

<div class="tableCard">

<!-- SEARCH -->
<div style="display:flex; gap:10px; margin-bottom:15px; flex-wrap:wrap;">
<input type="date" id="searchDate">
<input type="text" id="searchService" placeholder="Search service...">
</div>

<table>
<thead>
<tr>
<th>Date</th>
<th>Service</th>
<th>Payment</th>
<th>Amount</th>
<th>Action</th>
</tr>
</thead>

<tbody id="walkTable"></tbody>
</table>

</div>

</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="modal-box" style="position:relative;">

<!-- ❌ CLOSE BUTTON -->
<button onclick="closeModal()" style="
position:absolute;
top:10px;
right:12px;
background:none;
border:none;
font-size:18px;
cursor:pointer;
color:#555;
font-weight:bold;
">✖</button>

<h3 id="modalTitle" style="margin-top:0;">Add Walk-in</h3>

<input type="text" id="service" placeholder="Service">
<input type="number" id="amount" placeholder="Amount">

<select id="payment">
<option value="">Select Payment</option>
<option value="Cash">💵 Cash</option>
<option value="GCash">📱 GCash</option>
<option value="BPI">🏦 BPI</option>
<option value="Maya">📲 Maya</option>
</select>

<button class="primaryBtn" style="width:100%;" onclick="saveWalkIn()">Save</button>

</div>
</div>

<script>

/* ===============================
🔒 ADMIN SESSION SECURITY
=============================== */
function checkAdminSession(){

const session =
JSON.parse(localStorage.getItem("salonSession")) ||
JSON.parse(sessionStorage.getItem("salonSession"));

if(!session || session.role !== "admin"){
window.location.replace("../log_in.html");
}

}

checkAdminSession();

window.addEventListener("pageshow", function(event){
if(event.persisted){
location.reload();
}
checkAdminSession();
});

document.addEventListener("visibilitychange", function(){
if(document.visibilityState === "visible"){
checkAdminSession();
}
});

/* ===============================
📦 LOAD DATA
=============================== */
let walkIns = JSON.parse(localStorage.getItem("walkIns") || "[]");
let editIndex = null;

/* ===============================
📊 RENDER TABLE
=============================== */
function renderTable(){

const table = document.getElementById("walkTable");
if(!table) return;

table.innerHTML = "";

const searchDate = document.getElementById("searchDate")?.value || "";
const searchService = document.getElementById("searchService")?.value.toLowerCase() || "";

walkIns.forEach((w, index)=>{

if(searchDate && w.date !== searchDate) return;
if(searchService && !w.service.toLowerCase().includes(searchService)) return;

table.innerHTML += `
<tr>
<td>${w.date}</td>
<td>${w.service}</td>
<td>${w.payment || "-"}</td>
<td>₱${Number(w.amount).toLocaleString()}</td>
<td>
<button class="actionBtn editBtn" onclick="editWalkIn(${index})">Edit</button>
<button class="actionBtn deleteBtn" onclick="deleteWalkIn(${index})">Delete</button>
</td>
</tr>
`;

});

/* Empty state */
if(table.innerHTML === ""){
table.innerHTML = `<tr><td colspan="5" style="text-align:center; color:#999;">No data found</td></tr>`;
}

}

/* ===============================
📂 OPEN MODAL
=============================== */
function openModal(){

const modal = document.getElementById("modal");
modal.style.display = "flex";

document.getElementById("modalTitle").innerText = "Add Walk-in";

editIndex = null;

document.getElementById("service").value = "";
document.getElementById("amount").value = "";

const paymentInput = document.getElementById("payment");
if(paymentInput) paymentInput.value = "";

}

/* ===============================
❌ CLOSE MODAL
=============================== */
function closeModal(){
document.getElementById("modal").style.display = "none";
}

/* Close when clicking outside */
window.addEventListener("click", function(e){
const modal = document.getElementById("modal");
if(e.target === modal){
modal.style.display = "none";
}
});

/* ===============================
💾 SAVE WALK-IN
=============================== */
function saveWalkIn(){

const service = document.getElementById("service").value.trim();
const amount = parseFloat(document.getElementById("amount").value);
const payment = document.getElementById("payment")?.value;

/* Validation */
if(!service){
alert("Service is required");
return;
}

if(isNaN(amount) || amount <= 0){
alert("Enter a valid amount");
return;
}

if(!payment){
alert("Select payment method");
return;
}

const today = new Date().toISOString().split("T")[0];

/* ADD */
if(editIndex === null){

walkIns.push({
id: "walk_" + Date.now(),
service,
amount,
payment,
date: today
});

}
/* UPDATE */
else{

walkIns[editIndex].service = service;
walkIns[editIndex].amount = amount;
walkIns[editIndex].payment = payment;

}

/* Save */
localStorage.setItem("walkIns", JSON.stringify(walkIns));

/* Close modal */
closeModal();

/* Refresh table */
renderTable();

}

/* ===============================
✏️ EDIT
=============================== */
function editWalkIn(index){

openModal();

document.getElementById("modalTitle").innerText = "Edit Walk-in";

document.getElementById("service").value = walkIns[index].service;
document.getElementById("amount").value = walkIns[index].amount;

const paymentInput = document.getElementById("payment");
if(paymentInput){
paymentInput.value = walkIns[index].payment || "";
}

editIndex = index;

}

/* ===============================
🗑 DELETE
=============================== */
function deleteWalkIn(index){

if(confirm("Delete this walk-in?")){

walkIns.splice(index,1);
localStorage.setItem("walkIns", JSON.stringify(walkIns));
renderTable();

}

}

/* ===============================
🔎 LIVE SEARCH
=============================== */
document.getElementById("searchDate")?.addEventListener("input", renderTable);
document.getElementById("searchService")?.addEventListener("input", renderTable);

/* ===============================
🚀 INIT
=============================== */
renderTable();

</script>

</body>
</html>
