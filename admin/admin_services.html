<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Services</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--green:#2f7d62;
--green2:#256a52;
--bg:#f4fbf7;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
--line:rgba(15,23,42,.08);  
--shadow:0 14px 40px rgba(2,6,23,.08);
--radius:16px;
--greenSoft:rgba(47,125,98,.12);
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:Poppins;
background:var(--bg);
display:flex;
color:var(--text);
}

/* SIDEBAR */

.sidebar{
width:260px;
background:linear-gradient(180deg,var(--green),var(--green2));
color:white;
padding:28px 22px;
min-height:100vh;
}

.logo{
font-weight:800;
font-size:18px;
margin-bottom:35px;
}

.nav{
display:flex;
flex-direction:column;
gap:6px;
}

.nav a{
display:block;
color:white;
text-decoration:none;
padding:12px 14px;
border-radius:12px;
font-size:13px;
font-weight:600;
transition:.15s;
}

.nav a:hover{
background:rgba(255,255,255,.15);
}

.nav a.active{
background:rgba(255,255,255,.25);
}

/* MAIN */

.main{
flex:1;
padding:30px;
max-width:1200px;
}

.header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:25px;
}

.header h1{
margin:0;
font-size:28px;
}

/* TABLE CARD */

.tableCard{
background:var(--card);
padding:22px;
border-radius:var(--radius);
box-shadow:var(--shadow);
border:1px solid var(--line);
}

/* TABLE HEADER */

.tableHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.tableHeader h3{
margin:0;
font-size:16px;
}

/* ADD BUTTON */

.addBtn{
background:var(--green);
color:white;
border:none;
padding:8px 14px;
border-radius:10px;
font-size:13px;
font-weight:600;
cursor:pointer;
transition:.15s;
}

.addBtn:hover{
background:var(--green2);
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

thead{
background:var(--greenSoft);
}

th{
text-align:left;
font-size:12px;
color:var(--muted);
padding:12px;
font-weight:700;
}

td{
padding:12px;
border-bottom:1px solid var(--line);
}

tr:hover{
background:#f9fdfb;
}

/* ACTION BUTTONS */

.actionBtn{
border:none;
padding:6px 10px;
border-radius:8px;
font-size:12px;
font-weight:600;
cursor:pointer;
margin-right:5px;
transition:.15s;
}

.edit{
background:#e7f7ef;
color:var(--green2);
}

.delete{
background:#fdeaea;
color:#c53030;
}

.actionBtn:hover{
transform:translateY(-1px);
}

/* MOBILE */

@media(max-width:900px){

.sidebar{
display:none;
}

body{
flex-direction:column;
}

.main{
padding:20px;
}

}

/* MODAL OVERLAY */

/* ===============================
MODAL OVERLAY (BACKGROUND)
================================ */
.modal{
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.45);

  display: none; /* stays hidden until opened */
  justify-content: center;
  align-items: center;

  z-index: 1000;
}

.modalContent{
  background: white;
  padding: 25px;
  border-radius: 16px;
  box-shadow: 0 20px 50px rgba(0,0,0,.25);
  width: 340px;
  border: 1px solid var(--line);

  display: flex;
  flex-direction: column;
  gap: 10px;

  position: relative;
  animation: fadeIn .25s ease;

  /* ✅ THIS IS THE FIX */
  max-height: 90vh;
  overflow-y: auto;
}

/* ===============================
ANIMATION
================================ */
@keyframes fadeIn{
  from{
    opacity: 0;
    transform: translateY(20px);
  }
  to{
    opacity: 1;
    transform: translateY(0);
  }
}

/* ===============================
TITLE
================================ */
.modalContent h3{
  margin: 0 0 10px 0;
  font-size: 18px;
}

/* ===============================
INPUTS
================================ */
.modalContent input,
.modalContent select,
.modalContent textarea{
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: 1px solid #ddd;
  font-family: Poppins;
  font-size: 13px;
}

.modalContent textarea{
  resize: none;
  height: 70px;
}

/* ===============================
SAVE BUTTON
================================ */
.saveBtn{
  background: var(--green);
  color: white;
  border: none;
  padding: 10px;
  border-radius: 10px;
  width: 100%;
  font-weight: 600;
  cursor: pointer;
  transition: 0.2s;
}

.saveBtn:hover{
  background: var(--green2);
}

/* ===============================
CLOSE BUTTON ✕
================================ */
.modalCloseBtn{
  position: absolute;
  top: 10px;
  right: 12px;
  border: none;
  background: #eee;
  width: 30px;
  height: 30px;
  border-radius: 8px;
  cursor: pointer;
  font-size: 14px;
}

.modalCloseBtn:hover{
  background: #ddd;
}

/* ===============================
TABLE SCROLL FIX
================================ */
.tableWrapper{
  max-height: 400px;   /* adjust height */
  overflow-y: auto;
  border-radius: 12px;
}

/* Optional: smooth scrollbar */
.tableWrapper::-webkit-scrollbar{
  width: 8px;
}

.tableWrapper::-webkit-scrollbar-thumb{
  background: rgba(0,0,0,0.2);
  border-radius: 10px;
}

.tableWrapper::-webkit-scrollbar-track{
  background: transparent;
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

  <div class="logo">🌿 BASIT Admin</div>

  <div class="nav">
    <a href="admin_dashboard.html">Dashboard</a>
    <a href="admin_gallery.html">Manage Gallery</a>
    <a href="admin_walkins.html">Manage Walk-ins</a>
    <a href="admin_bookings.html">Manage Bookings</a>
    <a href="admin_promo.html">Manage Promo</a>
    <a class="active">Manage Services</a>
    <a href="admin_specialist.html">Manage Specialist</a>
    <a href="admin_manageaccount.html">Manage Account</a>
    <a href="admin_account.html">Account Settings</a>
    <a href="logout.html">Log Out</a>
  </div>

</div>

<!-- MAIN -->
<div class="main">

  <div class="header">
    <h1>Manage Services</h1>
  </div>

  <div class="tableCard">

    <div class="tableHeader">
      <h3>Services</h3>
      <button class="addBtn" onclick="openModal()">+ Add Service</button>
    </div>

   <div class="tableWrapper">
  <table>
    <thead>
      <tr>
        <th>Service</th>
        <th>Price</th>
        <th>Duration</th>
        <th>Action</th>
      </tr>
    </thead>

    <tbody id="serviceTable"></tbody>
  </table>
</div>

  </div>

</div>

<!-- ===============================
SERVICE MODAL (CENTERED)
================================ -->
<div class="modal" id="serviceModal">

  <div class="modalContent">

    <!-- CLOSE BUTTON -->
    <button onclick="closeModal()" class="modalCloseBtn">✕</button>

    <h3 id="modalTitle">Add Service</h3>

    <input type="text" id="serviceName" placeholder="Service Name">

    <input type="number" id="servicePrice" placeholder="Price">

    <input type="number" id="serviceDuration" placeholder="Duration (minutes)">

    <select id="serviceCategory"></select>

<input 
  type="text" 
  id="newCategory" 
  placeholder="Add new category"
>

<button onclick="addCategory()" class="addBtn">+ Add Category</button>

    <textarea id="serviceDesc" placeholder="Description"></textarea>

    <!-- IMAGE PREVIEW -->
    <img id="previewImage" style="display:none;width:100%;border-radius:8px;margin-bottom:8px;">

    <input type="file" id="serviceImage" onchange="previewImage(event)">

    <button class="saveBtn" onclick="saveService()">Save Service</button>

  </div>

</div>

<script src="session.js"></script>

<script>

/* ===============================
CONFIG
================================ */
const API_BASE = "https://salon-spa.onrender.com";

/* ===============================
ADMIN SESSION CHECK
================================ */
const session =
JSON.parse(localStorage.getItem("salonSession")) ||
JSON.parse(sessionStorage.getItem("salonSession"));

if(!session || session.role !== "admin"){
  window.location.href="../log_in.html";
}

/* ===============================
STATE
================================ */
let services = [];
let editId = null;
let categories = [];

/* ===============================
LOAD CATEGORIES
================================ */
async function loadCategories(){
  try{
    const res = await fetch(`${API_BASE}/services`);

    if(!res.ok) throw new Error("Failed to load categories");

    const data = await res.json();

    const unique = [
      ...new Set(
        data
          .map(s => (s.category || "").trim())
          .filter(c => c !== "")
      )
    ];

    categories = unique;
    renderCategories();

  }catch(err){
    console.error("❌ Category load error:", err);
  }
}

/* ===============================
LOAD SERVICES
================================ */
async function loadServices(){
  try{
    const res = await fetch(`${API_BASE}/services`);

    if(!res.ok) throw new Error("Failed to load services");

    services = await res.json();
    renderServices();

  }catch(err){
    console.error("❌ LOAD ERROR:", err);
  }
}

/* ===============================
RENDER TABLE
================================ */
function renderServices(){
  const table = document.getElementById("serviceTable");
  table.innerHTML = "";

  services.forEach((service)=>{
    table.innerHTML += `
    <tr>
      <td>${service.name}</td>
      <td>₱${service.price}</td>
      <td>${service.duration} mins</td>
      <td>
        <button class="actionBtn edit" onclick="editService(${service.id})">Edit</button>
        <button class="actionBtn delete" onclick="deleteService(${service.id})">Delete</button>
      </td>
    </tr>
    `;
  });
}

/* ===============================
RENDER CATEGORIES
================================ */
function renderCategories(){
  const select = document.getElementById("serviceCategory");
  select.innerHTML = "";

  categories.forEach(cat => {
    const option = document.createElement("option");
    option.value = cat;
    option.textContent = cat;
    select.appendChild(option);
  });
}

/* ===============================
ADD CATEGORY
================================ */
function addCategory(){
  const input = document.getElementById("newCategory");
  let value = input.value.trim();

  if(!value) return;

  value = value.charAt(0).toUpperCase() + value.slice(1);

  if(!categories.includes(value)){
    categories.push(value);
    renderCategories();
  }

  document.getElementById("serviceCategory").value = value;
  input.value = "";
}

/* ===============================
OPEN MODAL
================================ */
function openModal(){
  document.getElementById("serviceModal").style.display = "flex";

  if(editId === null){
    resetForm();
    document.querySelector(".saveBtn").textContent = "Save Service";
    document.getElementById("modalTitle").textContent = "Add Service";
  }
}

/* ===============================
RESET FORM
================================ */
function resetForm(){
  renderCategories();

  document.getElementById("serviceName").value = "";
  document.getElementById("servicePrice").value = "";
  document.getElementById("serviceDuration").value = "";
  document.getElementById("serviceCategory").value = categories[0] || "";
  document.getElementById("serviceDesc").value = "";
  document.getElementById("serviceImage").value = "";

  const preview = document.getElementById("previewImage");
  if(preview){
    preview.style.display = "none";
    preview.src = "";
  }
}

/* ===============================
SAVE / UPDATE SERVICE
================================ */
async function saveService(){

  const name = document.getElementById("serviceName").value.trim();
  const price = document.getElementById("servicePrice").value;
  const duration = document.getElementById("serviceDuration").value;
  const category = document.getElementById("serviceCategory").value;
  const description = document.getElementById("serviceDesc").value;
  const file = document.getElementById("serviceImage").files[0];

  if(!name || !price || !duration){
    return alert("Please fill all required fields");
  }

  const formData = new FormData();
  formData.append("name", name);
  formData.append("description", description);
  formData.append("price", price);
  formData.append("duration", duration);
  formData.append("category", category);

  if(file){
    formData.append("image", file);
  }

  try{

    let res;

    if(editId !== null){
      res = await fetch(`${API_BASE}/services/${editId}`, {
        method: "PUT",
        body: formData
      });
    }else{
      if(!file){
        return alert("Please upload image");
      }

      res = await fetch(`${API_BASE}/services`, {
        method: "POST",
        body: formData
      });
    }

    if(!res.ok){
      throw new Error("Save failed");
    }

    alert("✅ Service saved!");
    closeModal();
    loadServices();

  }catch(err){
    console.error("❌ SAVE ERROR:", err);
    alert("Failed to save service");
  }
}

/* ===============================
DELETE SERVICE
================================ */
async function deleteService(id){

  if(!confirm("Delete this service?")) return;

  try{
    const res = await fetch(`${API_BASE}/services/${id}`, {
      method: "DELETE"
    });

    if(!res.ok){
      throw new Error("Delete failed");
    }

    loadServices();

  }catch(err){
    console.error("❌ DELETE ERROR:", err);
    alert("Failed to delete service");
  }
}

/* ===============================
EDIT SERVICE
================================ */
function editService(id){

  const s = services.find(x => x.id == id);

  if(!categories.includes(s.category)){
    categories.push(s.category);
  }

  renderCategories();

  document.getElementById("serviceName").value = s.name;
  document.getElementById("servicePrice").value = s.price;
  document.getElementById("serviceDuration").value = s.duration;
  document.getElementById("serviceCategory").value = s.category;
  document.getElementById("serviceDesc").value = s.description;

  editId = id;

  document.querySelector(".saveBtn").textContent = "Update Service";
  document.getElementById("modalTitle").textContent = "Edit Service";

  openModal();
}

/* ===============================
IMAGE PREVIEW
================================ */
function previewImage(event){
  const file = event.target.files[0];
  const preview = document.getElementById("previewImage");

  if(file){
    preview.src = URL.createObjectURL(file);
    preview.style.display = "block";
  }
}

/* ===============================
CLOSE MODAL
================================ */
function closeModal(){
  document.getElementById("serviceModal").style.display = "none";
  editId = null;
  resetForm();
}

/* CLOSE ON OUTSIDE CLICK */
window.addEventListener("click", function(e){
  const modal = document.getElementById("serviceModal");
  if(e.target === modal){
    closeModal();
  }
});

/* ===============================
INIT
================================ */
loadServices();
loadCategories();

/* ENTER KEY = ADD CATEGORY */
const input = document.getElementById("newCategory");
if(input){
  input.addEventListener("keypress", function(e){
    if(e.key === "Enter"){
      addCategory();
    }
  });
}

</script>
</html>
