<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Services</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--green:#2f7d62;
--green2:#256a52;
--bg:#f4fbf7;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
--line:rgba(15,23,42,.08);
--shadow:0 14px 40px rgba(2,6,23,.08);
--radius:16px;
--greenSoft:rgba(47,125,98,.12);
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:Poppins;
background:var(--bg);
display:flex;
color:var(--text);
}

/* SIDEBAR */

.sidebar{
width:260px;
background:linear-gradient(180deg,var(--green),var(--green2));
color:white;
padding:28px 22px;
min-height:100vh;
}

.logo{
font-weight:800;
font-size:18px;
margin-bottom:35px;
}

.nav{
display:flex;
flex-direction:column;
gap:6px;
}

.nav a{
display:block;
color:white;
text-decoration:none;
padding:12px 14px;
border-radius:12px;
font-size:13px;
font-weight:600;
transition:.15s;
}

.nav a:hover{
background:rgba(255,255,255,.15);
}

.nav a.active{
background:rgba(255,255,255,.25);
}

/* MAIN */

.main{
flex:1;
padding:30px;
max-width:1200px;
}

.header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:25px;
}

.header h1{
margin:0;
font-size:28px;
}

/* TABLE CARD */

.tableCard{
background:var(--card);
padding:22px;
border-radius:var(--radius);
box-shadow:var(--shadow);
border:1px solid var(--line);
}

/* TABLE HEADER */

.tableHeader{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.tableHeader h3{
margin:0;
font-size:16px;
}

/* ADD BUTTON */

.addBtn{
background:var(--green);
color:white;
border:none;
padding:8px 14px;
border-radius:10px;
font-size:13px;
font-weight:600;
cursor:pointer;
transition:.15s;
}

.addBtn:hover{
background:var(--green2);
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

thead{
background:var(--greenSoft);
}

th{
text-align:left;
font-size:12px;
color:var(--muted);
padding:12px;
font-weight:700;
}

td{
padding:12px;
border-bottom:1px solid var(--line);
}

tr:hover{
background:#f9fdfb;
}

/* ACTION BUTTONS */

.actionBtn{
border:none;
padding:6px 10px;
border-radius:8px;
font-size:12px;
font-weight:600;
cursor:pointer;
margin-right:5px;
transition:.15s;
}

.edit{
background:#e7f7ef;
color:var(--green2);
}

.delete{
background:#fdeaea;
color:#c53030;
}

.actionBtn:hover{
transform:translateY(-1px);
}

/* MOBILE */

@media(max-width:900px){

.sidebar{
display:none;
}

body{
flex-direction:column;
}

.main{
padding:20px;
}

}

/* MODAL OVERLAY */

.modal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:white;
padding:25px;
border-radius:16px;
box-shadow:0 20px 50px rgba(0,0,0,.25);
width:340px;
display:none;
z-index:1000;
border:1px solid var(--line);
}

.modal h3{
margin-top:0;
margin-bottom:15px;
font-size:18px;
}

.modal input,
.modal select,
.modal textarea{
width:100%;
padding:10px;
margin-bottom:10px;
border-radius:8px;
border:1px solid #ddd;
font-family:Poppins;
font-size:13px;
}

.modal textarea{
resize:none;
height:70px;
}

.saveBtn{
background:var(--green);
color:white;
border:none;
padding:10px;
border-radius:10px;
width:100%;
font-weight:600;
cursor:pointer;
}

.saveBtn:hover{
background:var(--green2);
}
</style>

</head>

<body>

<!-- SIDEBAR -->
<div class="sidebar">

<div class="logo">🌿 BASIT Admin</div>

<div class="nav">
<a href="admin_dashboard.html">Dashboard</a>
<a href="admin_gallery.html">Manage Gallery</a>
<a href="admin_bookings.html">Manage Bookings</a>
<a href="admin_promo.html">Manage Promo</a>
<a class="active">Manage Services</a>
<a href="admin_specialist.html">Manage Specialist</a>
<a href="admin_manageaccount.html">Manage Account</a>
<a href="admin_account.html">Account Settings</a>
<a href="logout.html">Log Out</a>
</div>

</div>

<!-- MAIN -->
<div class="main">

<div class="header">
<h1>Manage Services</h1>
</div>

<div class="tableCard">

<div class="tableHeader">
<h3>Services</h3>
<button class="addBtn" onclick="openModal()">+ Add Service</button>
</div>

<table>

<thead>
<tr>
<th>Service</th>
<th>Price</th>
<th>Duration</th>
<th>Action</th>
</tr>
</thead>

<tbody id="serviceTable"></tbody>

</table>

</div>

</div>


<!-- SERVICE MODAL -->
<div class="modal" id="serviceModal">

<h3>Add / Edit Service</h3>

<input type="text" id="serviceName" placeholder="Service Name">

<input type="number" id="servicePrice" placeholder="Price">

<input type="number" id="serviceDuration" placeholder="Duration (minutes)">

<select id="serviceCategory">
<option value="Hair">Hair</option>
<option value="Nails">Nails</option>
<option value="Spa">Spa</option>
<option value="Packages">Packages</option>
</select>

<textarea id="serviceDesc" placeholder="Description"></textarea>

<input type="file" id="serviceImage">

<button class="saveBtn" onclick="saveService()">Save Service</button>

</div>


<script>

let services = JSON.parse(localStorage.getItem("services")) || []

let editIndex = null

function renderServices(){

const table = document.getElementById("serviceTable")
table.innerHTML=""

services.forEach((service,index)=>{

table.innerHTML += `
<tr>
<td>${service.name}</td>
<td>₱${service.amount}</td>
<td>${service.duration} mins</td>
<td>
<button class="actionBtn edit" onclick="editService(${index})">Edit</button>
<button class="actionBtn delete" onclick="deleteService(${index})">Delete</button>
</td>
</tr>
`

})

}

function openModal(){

document.getElementById("serviceModal").style.display="block"

if(editIndex===null){

document.getElementById("serviceName").value=""
document.getElementById("servicePrice").value=""
document.getElementById("serviceDuration").value=""
document.getElementById("serviceDesc").value=""

}

}

function saveService(){

const name=document.getElementById("serviceName").value
const price=document.getElementById("servicePrice").value
const duration=document.getElementById("serviceDuration").value
const category=document.getElementById("serviceCategory").value
const desc=document.getElementById("serviceDesc").value

const file=document.getElementById("serviceImage").files[0]

const reader=new FileReader()

reader.onload=function(){

const image=reader.result

const data={
id:"S"+Math.floor(Math.random()*10000),
name,
desc,
amount:price,
duration,
category,
image
}

if(editIndex===null){

services.push(data)

}else{

data.id=services[editIndex].id
services[editIndex]=data
editIndex=null

}

localStorage.setItem("services",JSON.stringify(services))

location.reload()

}

if(file){
reader.readAsDataURL(file)
}else{
alert("Please upload image")
}

}

function editService(index){

const s=services[index]

document.getElementById("serviceName").value=s.name
document.getElementById("servicePrice").value=s.amount
document.getElementById("serviceDuration").value=s.duration
document.getElementById("serviceCategory").value=s.category
document.getElementById("serviceDesc").value=s.desc

editIndex=index

openModal()

}

function deleteService(index){

services.splice(index,1)

localStorage.setItem("services",JSON.stringify(services))

renderServices()

}

renderServices()

</script>

</body>
</html>
