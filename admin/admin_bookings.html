<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Bookings</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--green:#2f7d62;
--green2:#256a52;
--bg:#f4fbf7;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
--line:rgba(15,23,42,.08);
--shadow:0 14px 40px rgba(2,6,23,.08);
--radius:16px;
--greenSoft:rgba(47,125,98,.12);
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:Poppins;
background:var(--bg);
display:flex;
color:var(--text);
}

/* SIDEBAR */

.sidebar{
width:260px;
background:linear-gradient(180deg,var(--green),var(--green2));
color:white;
padding:28px 22px;
min-height:100vh;
}

.logo{
font-weight:800;
font-size:18px;
letter-spacing:.5px;
margin-bottom:35px;
}

.nav{
display:flex;
flex-direction:column;
gap:6px;
}

.nav a{
display:block;
color:white;
text-decoration:none;
padding:12px 14px;
border-radius:12px;
font-size:13px;
font-weight:600;
transition:.15s;
}

.nav a:hover{
background:rgba(255,255,255,.15);
}

.nav a.active{
background:rgba(255,255,255,.25);
}

/* MAIN */

.main{
flex:1;
padding:30px;
max-width:1400px;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:25px;
}

.header h1{
margin:0;
font-size:28px;
}

/* TABLE CARD */

.tableCard{
background:var(--card);
padding:22px;
border-radius:var(--radius);
box-shadow:var(--shadow);
border:1px solid var(--line);
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

thead{
background:var(--greenSoft);
}

th{
text-align:left;
font-size:12px;
color:var(--muted);
padding:12px;
font-weight:700;
}

td{
padding:12px;
border-bottom:1px solid var(--line);
vertical-align:middle;
}

tr:hover{
background:#f9fdfb;
}

/* STATUS */

.status{
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:600;
}

.pending{
background:#fff4e5;
color:#b45309;
}

.approved{
background:#e7f7ef;
color:var(--green2);
}

.cancelled{
background:#fdeaea;
color:#c53030;
}

/* ACTION BUTTONS */

.actionBtn{
border:none;
padding:6px 10px;
border-radius:8px;
font-size:12px;
font-weight:600;
cursor:pointer;
margin-right:5px;
}

.approve{
background:#e7f7ef;
color:var(--green2);
}

.cancel{
background:#fdeaea;
color:#c53030;
}

/* QR */

.qr{
width:55px;
border-radius:6px;
border:1px solid var(--line);
cursor:pointer;
transition:0.2s;
}

.qr:hover{
transform:scale(1.05);
}

/* MODAL */
.serviceList{
font-size:13px;
line-height:1.4;
}

.empty{
text-align:center;
padding:40px;
color:var(--muted);
}

@media(max-width:900px){

.sidebar{
display:none;
}

body{
flex-direction:column;
}

.main{
padding:20px;
}

}
.tableWrapper{
max-height: 520px; /* slightly taller */
overflow: auto;
border-radius: 12px;
border: 1px solid var(--line);
background: var(--card);

/* smooth scrolling */
scroll-behavior: smooth;
}

/* Sticky header (cleaner + layered properly) */
thead th{
position: sticky;
top: 0;
background: var(--card); /* better than greenSoft for readability */
z-index: 5;

/* subtle separation */
box-shadow: 0 2px 0 var(--line);
}

/* Optional: keep header color accent */
thead{
background: var(--greenSoft);
}

/* Custom scrollbar (modern look) */
.tableWrapper::-webkit-scrollbar{
width: 8px;
height: 8px;
}

.tableWrapper::-webkit-scrollbar-track{
background: transparent;
}

.tableWrapper::-webkit-scrollbar-thumb{
background: rgba(0,0,0,0.2);
border-radius: 10px;
transition: 0.2s;
}

.tableWrapper::-webkit-scrollbar-thumb:hover{
background: rgba(0,0,0,0.35);
}

/* Firefox support */
.tableWrapper{
scrollbar-width: thin;
scrollbar-color: rgba(0,0,0,0.25) transparent;
}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">🌿 BASIT Admin</div>

<div class="nav">

<a href="admin_dashboard.html">Dashboard</a>
<a href="admin_gallery.html">Manage Gallery</a>
<a href="admin_walkins.html">Manage Walk-ins</a>
<a class="active">Manage Bookings</a>
<a href="admin_promo.html">Manage Promo</a>
<a href="admin_services.html">Manage Services</a>
<a href="admin_specialist.html">Manage Specialist</a>
<a href="admin_manageaccount.html">Manage Account</a>
<a href="admin_account.html">Account Settings</a>
<a href="logout.html">Log Out</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">

<h1>Manage Bookings</h1>

<!-- 🔍 SEARCH BAR -->
<input 
type="text" 
id="searchInput" 
placeholder="Search by name or date..."
style="
padding:10px 14px;
border-radius:10px;
border:1px solid var(--line);
font-family:Poppins;
width:260px;
outline:none;
"
>

</div>

<div class="tableCard">

<div class="tableWrapper">

<table>

<thead>
<tr>
<th>Booking ID</th>
<th>Customer</th>
<th>Service</th>
<th>Specialist</th>
<th>Date</th>
<th>Time</th>
<th>Notes</th>
<th>QR Code</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="bookingTable"></tbody>

</table>

<div id="emptyMessage" class="empty" style="display:none;">
No bookings yet.
</div>

</div>

</div>

<script src="session.js"></script>

<script>

/* ===============================
CONFIG
================================ */
const API_URL = "http://localhost:5000";

/* ===============================
ELEMENTS
================================ */
const table = document.getElementById("bookingTable");
const empty = document.getElementById("emptyMessage");
const searchInput = document.getElementById("searchInput");

let bookings = [];

/* ===============================
FORMAT DATE
================================ */
function formatDate(dateString){
  if(!dateString) return "-";

  const d = new Date(dateString);

  return d.toLocaleDateString("en-PH", {
    year: "numeric",
    month: "short",
    day: "numeric"
  });
}

/* ===============================
LOAD BOOKINGS
================================ */
async function loadBookings(){
  try{
    const res = await fetch(`${API_URL}/bookings`);
    const data = await res.json();

    bookings = data;

    renderBookings();

  }catch(err){
    console.error("❌ Failed to load bookings:", err);
  }
}

/* ===============================
RENDER BOOKINGS
================================ */
function renderBookings(){

table.innerHTML = "";

/* SEARCH */
const searchValue = (searchInput.value || "").toLowerCase();

/* FILTER */
const filtered = bookings.filter(booking => {

  const name =
    (booking.customer ||
     booking.email ||
     "Customer").toLowerCase();

  const formattedDate = formatDate(booking.date || booking.created_at).toLowerCase();

  return name.includes(searchValue) || formattedDate.includes(searchValue);

});

/* EMPTY */
if(filtered.length === 0){
empty.style.display = "block";
return;
}

empty.style.display = "none";

/* DISPLAY */
filtered.forEach((booking)=>{

/* SERVICE */
let serviceName = "Booking";
if(booking.services){
  try{
    const parsed =
      typeof booking.services === "string"
        ? JSON.parse(booking.services)
        : booking.services;

    if(Array.isArray(parsed)){
      serviceName = parsed.map(s => s.name || s.service || "-").join(", ");
    }
  }catch{}
}

/* DATE + TIME */
const date = formatDate(booking.date || booking.created_at);
const time = booking.time || "-";

/* STATUS CLASS */
let statusClass = "pending";
if(booking.status === "Approved") statusClass = "approved";
if(booking.status === "Cancelled") statusClass = "cancelled";
if(booking.status === "Done") statusClass = "done";

/* NAME */
const customerName = booking.customer || booking.email || "Customer";

/* QR */
const qrImage = booking.receipt || "";

/* ACTION LOGIC 🔥 */
let actionHTML = "";

/* ❌ CANCELLED = NO ACTION */
if(booking.status === "Cancelled"){
  actionHTML = `<span style="color:#c53030;font-size:12px;font-weight:600;">Cancelled</span>`;
}

/* ⏳ PENDING = APPROVE / CANCEL */
else if(booking.status === "Pending" || !booking.status){
  actionHTML = `
    <button class="actionBtn approve" onclick="approveBooking(${booking.id})">Approve</button>
    <button class="actionBtn cancel" onclick="cancelBooking(${booking.id})">Cancel</button>
  `;
}

/* ✅ APPROVED = DONE / CANCEL */
else if(booking.status === "Approved"){
  actionHTML = `
    <button class="actionBtn approve" onclick="markDone(${booking.id})">Done</button>
    <button class="actionBtn cancel" onclick="cancelBooking(${booking.id})">Cancel</button>
  `;
}

/* ✅ DONE = NO ACTION */
else if(booking.status === "Done"){
  actionHTML = `<span style="color:gray;font-size:12px;font-weight:600;">Completed</span>`;
}

/* CREATE ROW */
const row = document.createElement("tr");

row.innerHTML = `
<td>#B${String(booking.id).padStart(3,'0')}</td>
<td>${customerName}</td>
<td>${serviceName}</td>
<td>${booking.staff || "No preference"}</td>
<td>${date}</td>
<td>${time}</td>
<td>${booking.notes || "-"}</td>
<td>
${qrImage ? `<a href="${qrImage}" target="_blank" style="color:#256a52;font-weight:600;text-decoration:none;">View QR</a>` : "-"}
</td>
<td>
<span class="status ${statusClass}">
${booking.status || "Pending"}
</span>
</td>
<td>${actionHTML}</td>
`;

table.appendChild(row);

});

}

/* ===============================
SEARCH
================================ */
searchInput.addEventListener("input", renderBookings);

/* ===============================
APPROVE
================================ */
async function approveBooking(id){

  const booking = bookings.find(b => b.id === id);

  /* 🚫 PREVENT APPROVE IF CANCELLED */
  if(booking?.status === "Cancelled"){
    alert("This booking was cancelled by the customer.");
    return;
  }

  try{
    await fetch(`${API_URL}/bookings/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status: "Approved" })
    });

    loadBookings();

  }catch(err){
    console.error("❌ Approve error:", err);
  }
}

/* ===============================
CANCEL
================================ */
async function cancelBooking(id){
  try{
    await fetch(`${API_URL}/bookings/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status: "Cancelled" })
    });

    loadBookings();

  }catch(err){
    console.error("❌ Cancel error:", err);
  }
}

/* ===============================
DONE ✅
================================ */
async function markDone(id){

  if(!confirm("Mark this booking as DONE?")) return;

  try{
    await fetch(`${API_URL}/bookings/${id}`, {
      method: "PUT",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ status: "Done" })
    });

    loadBookings();

  }catch(err){
    console.error("❌ Done error:", err);
  }
}

/* ===============================
INIT
================================ */
loadBookings();

</script>

</body>
</html>
