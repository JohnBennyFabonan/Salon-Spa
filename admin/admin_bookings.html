<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Bookings</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--green:#2f7d62;
--green2:#256a52;
--bg:#f4fbf7;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
--line:rgba(15,23,42,.08);
--shadow:0 14px 40px rgba(2,6,23,.08);
--radius:16px;
--greenSoft:rgba(47,125,98,.12);
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:Poppins;
background:var(--bg);
display:flex;
color:var(--text);
}

/* SIDEBAR */

.sidebar{
width:260px;
background:linear-gradient(180deg,var(--green),var(--green2));
color:white;
padding:28px 22px;
min-height:100vh;
}

.logo{
font-weight:800;
font-size:18px;
letter-spacing:.5px;
margin-bottom:35px;
}

.nav{
display:flex;
flex-direction:column;
gap:6px;
}

.nav a{
display:block;
color:white;
text-decoration:none;
padding:12px 14px;
border-radius:12px;
font-size:13px;
font-weight:600;
transition:.15s;
}

.nav a:hover{
background:rgba(255,255,255,.15);
}

.nav a.active{
background:rgba(255,255,255,.25);
}

/* MAIN */

.main{
flex:1;
padding:30px;
max-width:1400px;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:25px;
}

.header h1{
margin:0;
font-size:28px;
}

/* TABLE CARD */

.tableCard{
background:var(--card);
padding:22px;
border-radius:var(--radius);
box-shadow:var(--shadow);
border:1px solid var(--line);
}

/* TABLE */

table{
width:100%;
border-collapse:collapse;
font-size:14px;
}

thead{
background:var(--greenSoft);
}

th{
text-align:left;
font-size:12px;
color:var(--muted);
padding:12px;
font-weight:700;
}

td{
padding:12px;
border-bottom:1px solid var(--line);
vertical-align:middle;
}

tr:hover{
background:#f9fdfb;
}

/* STATUS */

.status{
padding:5px 10px;
border-radius:20px;
font-size:12px;
font-weight:600;
}

.pending{
background:#fff4e5;
color:#b45309;
}

.approved{
background:#e7f7ef;
color:var(--green2);
}

.cancelled{
background:#fdeaea;
color:#c53030;
}

/* ACTION BUTTONS */

.actionBtn{
border:none;
padding:6px 10px;
border-radius:8px;
font-size:12px;
font-weight:600;
cursor:pointer;
margin-right:5px;
}

.approve{
background:#e7f7ef;
color:var(--green2);
}

.cancel{
background:#fdeaea;
color:#c53030;
}

/* QR */

.qr{
width:55px;
border-radius:6px;
border:1px solid var(--line);
cursor:pointer;
transition:0.2s;
}

.qr:hover{
transform:scale(1.05);
}

/* MODAL */

.qrModal{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.7);
display:none;
align-items:center;
justify-content:center;
z-index:999;
}

.qrModal img{
max-width:400px;
border-radius:10px;
box-shadow:0 10px 40px rgba(0,0,0,0.4);
}

.serviceList{
font-size:13px;
line-height:1.4;
}

.empty{
text-align:center;
padding:40px;
color:var(--muted);
}

@media(max-width:900px){

.sidebar{
display:none;
}

body{
flex-direction:column;
}

.main{
padding:20px;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">🌿 BASIT Admin</div>

<div class="nav">

<a href="admin_dashboard.html">Dashboard</a>
<a href="admin_gallery.html">Manage Gallery</a>
<a class="active">Manage Bookings</a>
<a href="admin_promo.html">Manage Promo</a>
<a href="admin_services.html">Manage Services</a>
<a href="admin_specialist.html">Manage Specialist</a>
<a href="admin_manageaccount.html">Manage Account</a>
<a href="admin_account.html">Account Settings</a>
<a href="logout.html">Log Out</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">

<h1>Manage Bookings</h1>

<!-- 🔍 SEARCH BAR -->
<input 
type="text" 
id="searchInput" 
placeholder="Search by name or date..."
style="
padding:10px 14px;
border-radius:10px;
border:1px solid var(--line);
font-family:Poppins;
width:260px;
outline:none;
"
>

</div>

<div class="tableCard">

<table>

<thead>
<tr>
<th>Booking ID</th>
<th>Customer</th>
<th>Service</th>
<th>Specialist</th>
<th>Date</th>
<th>Time</th>
<th>Notes</th>
<th>QR Code</th>
<th>Status</th>
<th>Action</th>
</tr>
</thead>

<tbody id="bookingTable"></tbody>

</table>

<div id="emptyMessage" class="empty" style="display:none;">
No bookings yet.
</div>

</div>

</div>

<!-- QR MODAL -->

<div id="qrModal" class="qrModal">
<img id="qrPreview">
</div>

<script src="session.js"></script>

<script>

/* LOAD BOOKINGS */

let bookings = JSON.parse(localStorage.getItem("salonBookings")) || [];

const table = document.getElementById("bookingTable");
const empty = document.getElementById("emptyMessage");
const searchInput = document.getElementById("searchInput");

/* RENDER BOOKINGS WITH SEARCH */

function renderBookings(){

table.innerHTML = "";

/* GET SEARCH VALUE */
const searchValue = (searchInput.value || "").toLowerCase();

/* FILTER BOOKINGS */
const filtered = bookings.filter(booking => {

const name =
(booking.customer ||
 booking.name ||
 booking.user ||
 booking.email ||
 "Customer").toLowerCase();

const date = (booking.date || "").toLowerCase();

return name.includes(searchValue) || date.includes(searchValue);

});

/* EMPTY CHECK */

if(filtered.length === 0){
empty.style.display = "block";
return;
}

empty.style.display = "none";

/* DISPLAY FILTERED BOOKINGS */

filtered.forEach((booking)=>{

let servicesHTML = "";

if(Array.isArray(booking.services)){

booking.services.forEach(s=>{
servicesHTML += `<div class="serviceList">• ${s.name || s.service || "-"} ${s.duration ? "(" + s.duration + ")" : ""}</div>`;
});

}else{
servicesHTML = booking.service || "-";
}

/* STATUS STYLE */

let statusClass = "pending";
if(booking.status === "Approved") statusClass = "approved";
if(booking.status === "Cancelled") statusClass = "cancelled";

/* CUSTOMER NAME */

const customerName =
booking.customer ||
booking.name ||
booking.user ||
booking.email ||
"Customer";

/* QR IMAGE */

const qrImage =
booking.qr ||
booking.receipt ||
"";

/* GET REAL INDEX (IMPORTANT FIX) */

const realIndex = bookings.indexOf(booking);

/* CREATE ROW */

const row = document.createElement("tr");

row.innerHTML = `
<td>#B${String(realIndex+1).padStart(3,'0')}</td>
<td>${customerName}</td>
<td>${servicesHTML}</td>
<td>${booking.staff || "No preference"}</td>
<td>${booking.date || "-"}</td>
<td>${booking.time || "-"}</td>
<td>${booking.notes || "-"}</td>
<td>
${qrImage ? `<img src="${qrImage}" class="qr" onclick="openQR('${qrImage}')">` : "-"}
</td>
<td>
<span class="status ${statusClass}">
${booking.status || "Pending"}
</span>
</td>
<td>
<button class="actionBtn approve" onclick="approveBooking(${realIndex})">Approve</button>
<button class="actionBtn cancel" onclick="cancelBooking(${realIndex})">Cancel</button>
</td>
`;

table.appendChild(row);

});

}

/* SEARCH LISTENER */

searchInput.addEventListener("input", renderBookings);

/* APPROVE */

function approveBooking(index){
bookings[index].status = "Approved";
localStorage.setItem("salonBookings", JSON.stringify(bookings));
renderBookings();
}

/* CANCEL */

function cancelBooking(index){
bookings[index].status = "Cancelled";
localStorage.setItem("salonBookings", JSON.stringify(bookings));
renderBookings();
}

/* QR MODAL */

function openQR(src){
const modal = document.getElementById("qrModal");
const preview = document.getElementById("qrPreview");
preview.src = src;
modal.style.display = "flex";
}

document.getElementById("qrModal").addEventListener("click", function(){
this.style.display = "none";
});

/* INIT */

renderBookings();

</script>

</body>
</html>
