<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--green:#2f7d62;
--green2:#256a52;
--bg:#f4fbf7;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
--line:rgba(15,23,42,.08);
--shadow:0 14px 40px rgba(2,6,23,.08);
--radius:16px;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:Poppins;
background:var(--bg);
display:flex;
color:var(--text);
}

/* SIDEBAR */

.sidebar{
width:260px;
background:linear-gradient(180deg,var(--green),var(--green2));
color:white;
padding:28px 22px;
min-height:100vh;
}

.logo{
font-weight:800;
font-size:18px;
margin-bottom:35px;
}

.nav{
display:flex;
flex-direction:column;
gap:6px;
}

.nav a{
display:block;
color:white;
text-decoration:none;
padding:12px 14px;
border-radius:12px;
font-size:13px;
font-weight:600;
transition:.15s;
}

.nav a:hover{
background:rgba(255,255,255,.15);
}

.nav a.active{
background:rgba(255,255,255,.25);
}

/* MAIN */

.main{
flex:1;
padding:30px;
max-width:1300px;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
gap:10px;
flex-wrap:wrap;
}

.header h1{
margin:0;
font-size:28px;
}

/* BUTTON */

.button{
background:var(--green);
color:white;
border:none;
padding:9px 16px;
border-radius:10px;
font-size:13px;
font-weight:600;
cursor:pointer;
}

.button:hover{
background:var(--green2);
}

/* CATEGORY CONTROLS */

.categoryControls{
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

.categoryControls select,
.categoryControls input{
padding:8px;
border-radius:8px;
border:1px solid #ddd;
font-family:Poppins;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* GALLERY CARD */

.galleryCard{
background:var(--card);
border-radius:var(--radius);
box-shadow:var(--shadow);
border:1px solid var(--line);
overflow:hidden;
transition:.15s;
}

.galleryCard:hover{
transform:translateY(-3px);
}

.galleryCard img{
width:100%;
height:170px;
object-fit:cover;
display:block;
}

/* CARD FOOTER */

.cardFooter{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px;
}

.cardFooter span{
font-size:13px;
font-weight:600;
}

/* DELETE BUTTON */

.deleteBtn{
background:#fdeaea;
color:#c53030;
border:none;
padding:6px 10px;
border-radius:8px;
font-size:12px;
font-weight:600;
cursor:pointer;
}

/* MOBILE */

@media(max-width:900px){

.sidebar{
display:none;
}

body{
flex-direction:column;
}

.main{
padding:20px;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">

<div class="logo">🌿 BASIT Admin</div>

<div class="nav">

<a href="admin_dashboard.html">Dashboard</a>
<a class="active">Manage Gallery</a>
<a href="admin_bookings.html">Manage Bookings</a>
<a href="admin_promo.html">Manage Promo</a>
<a href="admin_services.html">Manage Services</a>
<a href="admin_specialist.html">Manage Specialist</a>
<a href="admin_manageaccount.html">Manage Account</a>
<a href="admin_account.html">Account Settings</a>
<a href="logout.html">Log Out</a>

</div>

</div>

<!-- MAIN -->

<div class="main">

<div class="header">

<h1>Manage Gallery</h1>

<div class="categoryControls">

<select id="categorySelect"></select>

<input type="text" id="newCategory" placeholder="New category">

<button class="button" onclick="addCategory()">Add Category</button>

<input type="file" id="uploadInput" hidden>

<button class="button" onclick="document.getElementById('uploadInput').click()">
+ Upload Image
</button>

</div>

</div>

<div class="grid" id="galleryGrid"></div>

</div>
<script src="session.js"></script>

<script>
    const session =
JSON.parse(localStorage.getItem("salonSession")) ||
JSON.parse(sessionStorage.getItem("salonSession"));

if(!session || session.role !== "admin"){
  window.location.href="../log_in.html";
}

/* CATEGORY SYSTEM */

let categories = JSON.parse(localStorage.getItem("categories")) || [
"Hair",
"Spa",
"Nails",
"Interior",
"Products"
];

const categorySelect = document.getElementById("categorySelect");

function loadCategories(){

categorySelect.innerHTML="";

categories.forEach(cat=>{
categorySelect.innerHTML += `<option value="${cat}">${cat}</option>`;
});

}

function addCategory(){

const input=document.getElementById("newCategory");

const newCat=input.value.trim();

if(!newCat) return;

categories.push(newCat);

localStorage.setItem("categories",JSON.stringify(categories));

loadCategories();

input.value="";

}

/* GALLERY SYSTEM */

let gallery = JSON.parse(localStorage.getItem("gallery")) || [];

const grid = document.getElementById("galleryGrid");
const uploadInput = document.getElementById("uploadInput");

function renderGallery(){

grid.innerHTML="";

gallery.forEach((item,index)=>{

grid.innerHTML += `

<div class="galleryCard">

<img src="${item.url}">

<div class="cardFooter">

<span>${item.category}</span>

<button class="deleteBtn" onclick="deleteImage(${index})">
Delete
</button>

</div>

</div>

`;

});

}

uploadInput.addEventListener("change",function(){

const file=this.files[0];

if(!file) return;

const reader=new FileReader();

reader.onload=function(e){

gallery.push({
title:"Salon Image",
category:categorySelect.value,
url:e.target.result
});

localStorage.setItem("gallery",JSON.stringify(gallery));

renderGallery();

};

reader.readAsDataURL(file);

});

function deleteImage(index){

gallery.splice(index,1);

localStorage.setItem("gallery",JSON.stringify(gallery));

renderGallery();

}

loadCategories();
renderGallery();

</script>

</body>
</html>
