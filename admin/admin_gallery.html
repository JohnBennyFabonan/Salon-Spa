<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Manage Gallery</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<style>

:root{
--green:#2f7d62;
--green2:#256a52;
--bg:#f4fbf7;
--card:#ffffff;
--text:#0f172a;
--muted:#64748b;
--line:rgba(15,23,42,.08);
--shadow:0 14px 40px rgba(2,6,23,.08);
--radius:16px;
}

*{box-sizing:border-box;}

body{
margin:0;
font-family:Poppins;
background:var(--bg);
display:flex;
color:var(--text);
}

/* SIDEBAR */

.sidebar{
width:260px;
background:linear-gradient(180deg,var(--green),var(--green2));
color:white;
padding:28px 22px;
min-height:100vh;
}

.logo{
font-weight:800;
font-size:18px;
margin-bottom:35px;
}

.nav{
display:flex;
flex-direction:column;
gap:6px;
}

.nav a{
display:block;
color:white;
text-decoration:none;
padding:12px 14px;
border-radius:12px;
font-size:13px;
font-weight:600;
transition:.15s;
}

.nav a:hover{
background:rgba(255,255,255,.15);
}

.nav a.active{
background:rgba(255,255,255,.25);
}

/* MAIN */

.main{
flex:1;
padding:30px;
max-width:1300px;
}

/* HEADER */

.header{
display:flex;
align-items:center;
justify-content:space-between;
margin-bottom:20px;
gap:10px;
flex-wrap:wrap;
}

.header h1{
margin:0;
font-size:28px;
}

/* BUTTON */

.button{
background:var(--green);
color:white;
border:none;
padding:9px 16px;
border-radius:10px;
font-size:13px;
font-weight:600;
cursor:pointer;
}

.button:hover{
background:var(--green2);
}

/* CATEGORY CONTROLS */

.categoryControls{
display:flex;
gap:10px;
align-items:center;
flex-wrap:wrap;
}

.categoryControls select,
.categoryControls input{
padding:8px;
border-radius:8px;
border:1px solid #ddd;
font-family:Poppins;
}

/* GRID */

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:20px;
}

/* GALLERY CARD */

.galleryCard{
background:var(--card);
border-radius:var(--radius);
box-shadow:var(--shadow);
border:1px solid var(--line);
overflow:hidden;
transition:.15s;
}

.galleryCard:hover{
transform:translateY(-3px);
}

.galleryCard img{
width:100%;
height:170px;
object-fit:cover;
display:block;
}

/* CARD FOOTER */

.cardFooter{
display:flex;
align-items:center;
justify-content:space-between;
padding:12px;
}

.cardFooter span{
font-size:13px;
font-weight:600;
}

/* DELETE BUTTON */

.deleteBtn{
background:#fdeaea;
color:#c53030;
border:none;
padding:6px 10px;
border-radius:8px;
font-size:12px;
font-weight:600;
cursor:pointer;
}

/* MOBILE */

@media(max-width:900px){

.sidebar{
display:none;
}

body{
flex-direction:column;
}

.main{
padding:20px;
}

}

</style>

</head>

<body>

<!-- SIDEBAR -->

<div class="sidebar">
  <div class="logo">🌿 BASIT Admin</div>
  <div class="nav">
    <a href="admin_dashboard.html">Dashboard</a>
    <a href="admin_gallery.html">Manage Gallery</a>
    <a href="admin_walkins.html">Manage Walk-ins</a>
    <a href="admin_bookings.html">Manage Bookings</a>
    <a href="admin_promo.html">Manage Promo</a>
    <a href="admin_services.html">Manage Services</a>
    <a href="admin_specialist.html">Manage Specialist</a>
    <a href="admin_manageaccount.html">Manage Account</a>
    <a href="admin_daily_report.html">Daily Report</a>
    <a href="admin_daily_summary.html">Daily Summary</a>
    <a href="admin_monthly_summary.html">Monthly Summary</a>
    <a href="admin_installments.html">Manage Installments</a>
    <a class="active" href="admin_installment_services.html">Installment Services</a>
    <a href="admin_account.html">Account Settings</a>
    <a href="logout.html">Log Out</a>
  </div>
</div>

<!-- MAIN -->

<div class="main">

<div class="header">

<h1>Manage Gallery</h1>

<div class="categoryControls">

<select id="categorySelect"></select>

<input type="text" id="newCategory" placeholder="New category">

<button class="button" onclick="addCategory()">Add Category</button>

<input type="file" id="uploadInput" hidden>

<button class="button" onclick="document.getElementById('uploadInput').click()">
+ Upload Image
</button>

</div>

</div>

<div class="grid" id="galleryGrid"></div>

</div>
<script src="session.js"></script>

<script>

/* ===============================
   CONFIG
================================ */
const API_BASE = "https://salon-spa.onrender.com";

/* ===============================
   🔒 ADMIN SESSION CHECK
================================ */
const session =
JSON.parse(localStorage.getItem("salonSession")) ||
JSON.parse(sessionStorage.getItem("salonSession"));

if(!session || session.role !== "admin"){
  window.location.href="../log_in.html";
}

/* ===============================
   📂 CATEGORY SYSTEM (DATABASE)
================================ */
const categorySelect = document.getElementById("categorySelect");

/* LOAD CATEGORIES FROM BACKEND */
async function loadCategories(){
  try{
    const res = await fetch(`${API_BASE}/categories`);

    if(!res.ok){
      throw new Error("Failed to fetch categories");
    }

    const data = await res.json();

    categorySelect.innerHTML = "";

    // ✅ clean + unique
    const unique = [
      ...new Set(
        data.map(c => (c.category || "").trim()).filter(c => c !== "")
      )
    ];

    unique.forEach(cat=>{
      categorySelect.innerHTML += `<option value="${cat}">${cat}</option>`;
    });

  }catch(err){
    console.error("❌ Failed to load categories", err);
  }
}

/* ADD CATEGORY (OPTIONAL ONLY) */
async function addCategory(){
  const input = document.getElementById("newCategory");
  const name = input.value.trim();

  if(!name) return;

  // ⚠️ NOTE:
  // Since you don’t have a categories table,
  // this only adds it TEMPORARILY in dropdown

  const option = document.createElement("option");
  option.value = name;
  option.textContent = name;

  categorySelect.appendChild(option);
  categorySelect.value = name;

  input.value = "";
}

/* ===============================
   🖼 GALLERY SYSTEM
================================ */
let gallery = [];

const grid = document.getElementById("galleryGrid");
const uploadInput = document.getElementById("uploadInput");

/* ===============================
   🔧 SAFE JSON PARSER
================================ */
async function safeFetchJSON(res){
  const text = await res.text();

  try{
    return JSON.parse(text);
  }catch{
    throw new Error("Invalid JSON:\n" + text);
  }
}

/* ===============================
   📥 LOAD GALLERY
================================ */
async function loadGallery(){
  try{
    const res = await fetch(`${API_BASE}/gallery`);

    if(!res.ok){
      throw new Error("Server not responding");
    }

    const data = await safeFetchJSON(res);

    gallery = data;
    renderGallery();

  }catch(err){
    console.error("❌ Load error:", err);
    alert("Cannot connect to server.");
  }
}

/* ===============================
   🧱 RENDER GALLERY
================================ */
function renderGallery(){
  grid.innerHTML = "";

  if(gallery.length === 0){
    grid.innerHTML = "<p>No images found.</p>";
    return;
  }

  gallery.forEach(item=>{
    grid.innerHTML += `
      <div class="galleryCard">
        <img src="${item.image_url}" 
             onerror="this.src='https://via.placeholder.com/300?text=Image+Error'">

        <div class="cardFooter">
          <span>${item.category || "Uncategorized"}</span>
          <button class="deleteBtn" onclick="deleteImage(${item.id})">
            Delete
          </button>
        </div>
      </div>
    `;
  });
}

/* ===============================
   ⬆ UPLOAD IMAGE
================================ */
uploadInput.addEventListener("change", async function(){

  const file = this.files[0];
  if(!file) return;

  const selectedCategory = categorySelect.value;

  if(!selectedCategory){
    alert("Please select a category first");
    return;
  }

  const formData = new FormData();
  formData.append("image", file);
  formData.append("title", "Salon Image");
  formData.append("category", selectedCategory);

  try{
    const res = await fetch(`${API_BASE}/gallery`, {
      method: "POST",
      body: formData
    });

    if(!res.ok){
      throw new Error("Upload failed");
    }

    await safeFetchJSON(res);

    alert("✅ Upload successful");

    uploadInput.value = "";

    await loadGallery();
    await loadCategories(); // 🔥 update categories after upload

  }catch(err){
    console.error("❌ Upload error:", err);
    alert("Upload failed.");
  }
});

/* ===============================
   🗑 DELETE IMAGE
================================ */
async function deleteImage(id){

  if(!confirm("Delete this image?")) return;

  try{
    const res = await fetch(`${API_BASE}/gallery/${id}`, {
      method: "DELETE"
    });

    if(!res.ok){
      throw new Error("Delete failed");
    }

    await safeFetchJSON(res);

    alert("🗑 Deleted successfully");

    await loadGallery();
    await loadCategories(); // 🔥 update categories after delete

  }catch(err){
    console.error("❌ Delete error:", err);
    alert("Delete failed.");
  }
}

/* ===============================
   🚀 INIT
================================ */
loadCategories();
loadGallery();

</script>

</body>
</html>
