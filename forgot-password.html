<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forgot Password | Salon & Spa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:"Poppins",sans-serif;
  background:#f4fbf7;
}

.container{
  max-width:500px;
  margin:80px auto;
  background:#fff;
  padding:25px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.08);
}

h2{
  margin:0 0 10px;
}

.field{
  margin-top:12px;
  display:flex;
  flex-direction:column;
  gap:6px;
}

.input{
  padding:12px;
  border-radius:10px;
  border:1px solid #ccc;
}

.btn{
  margin-top:15px;
  padding:12px;
  border:none;
  border-radius:10px;
  background:#2f7d62;
  color:#fff;
  font-weight:bold;
  cursor:pointer;
}

.error{
  display:none;
  margin-top:10px;
  color:#b91c1c;
  font-weight:bold;
}

.success{
  display:none;
  margin-top:10px;
  color:#15803d;
  font-weight:bold;
}

.link{
  display:block;
  margin-top:12px;
  font-size:13px;
}
</style>
</head>

<body>

<div class="container">
  <h2>Forgot Password</h2>
  <p>Enter your email to verify your account.</p>

  <!-- STEP 1: EMAIL -->
  <div class="field">
    <label>Email</label>
    <input class="input" id="email" type="email" placeholder="you@email.com">
  </div>

  <button class="btn" id="checkBtn">Check Account</button>

  <!-- STEP 2: SECURITY QUESTION -->
  <div id="securityBox" style="display:none;">
    
    <div class="field">
      <label>Security Question</label>
      <input class="input" id="question" readonly>
    </div>

    <div class="field">
      <label>Your Answer</label>
      <input class="input" id="answer" type="text" placeholder="Enter your answer">
    </div>

    <button class="btn" id="verifyBtn">Verify Answer</button>
  </div>

  <!-- STEP 3: RESET PASSWORD -->
  <div id="resetBox" style="display:none;">
    
    <div class="field">
      <label>New Password</label>
      <input class="input" id="newPass" type="password">
    </div>

    <button class="btn" id="resetBtn">Reset Password</button>
  </div>

  <div class="error" id="errBox"></div>
  <div class="success" id="okBox"></div>

  <a class="link" href="log_in.html">← Back to Login</a>
</div>

<script>

const emailEl = document.getElementById("email");
const questionEl = document.getElementById("question");
const answerEl = document.getElementById("answer");
const newPassEl = document.getElementById("newPass");

const checkBtn = document.getElementById("checkBtn");
const verifyBtn = document.getElementById("verifyBtn");
const resetBtn = document.getElementById("resetBtn");

const securityBox = document.getElementById("securityBox");
const resetBox = document.getElementById("resetBox");

const errBox = document.getElementById("errBox");
const okBox = document.getElementById("okBox");

let currentUser = null;

// ===== helpers =====
function err(msg){
  errBox.textContent = msg;
  errBox.style.display = "block";
  okBox.style.display = "none";
}

function ok(msg){
  okBox.textContent = msg;
  okBox.style.display = "block";
  errBox.style.display = "none";
}


// ===== STEP 1: CHECK EMAIL =====
checkBtn.addEventListener("click",()=>{

  const email = emailEl.value.trim();

  if(!email){
    return err("Enter your email.");
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];

  const user = users.find(u => u.email.toLowerCase() === email.toLowerCase());

  if(!user){
    return err("Account not found.");
  }

  currentUser = user;

  // show question
  questionEl.value = getQuestionText(user.securityQuestion);

  securityBox.style.display = "block";

  ok("Account found. Answer your security question.");
});


// ===== STEP 2: VERIFY ANSWER =====
verifyBtn.addEventListener("click",()=>{

  const answer = answerEl.value.trim().toLowerCase();

  if(!answer){
    return err("Enter your answer.");
  }

  if(answer !== currentUser.securityAnswer){
    return err("Incorrect answer.");
  }

  resetBox.style.display = "block";

  ok("Verified! You can now reset your password.");
});


// ===== STEP 3: RESET PASSWORD =====
resetBtn.addEventListener("click",()=>{

  const newPass = newPassEl.value;

  if(newPass.length < 8){
    return err("Password must be at least 8 characters.");
  }

  let users = JSON.parse(localStorage.getItem("users")) || [];

  users = users.map(u=>{
    if(u.email === currentUser.email){
      return {...u, password:newPass};
    }
    return u;
  });

  localStorage.setItem("users", JSON.stringify(users));

  ok("Password updated successfully!");

  setTimeout(()=>{
    window.location.href = "log_in.html";
  },1000);

});


// ===== QUESTION TEXT =====
function getQuestionText(code){
  switch(code){
    case "pet": return "What is your first pet's name?";
    case "school": return "What is the name of your elementary school?";
    case "city": return "In what city were you born?";
    case "mother": return "What is your mother's maiden name?";
    case "food": return "What is your favorite food?";
    default: return "Security Question";
  }
}

</script>

</body>
</html>
