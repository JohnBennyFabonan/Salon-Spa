<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | Salon & Spa</title>

  <link rel="stylesheet" href="mobile.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root{
      --green:#2f7d62;
      --green-2:#256a52;
      --bg:#f4fbf7;
      --card:#ffffff;
      --text:#0f172a;
      --muted:#64748b;
      --line:rgba(15,23,42,.10);
      --shadow:0 14px 40px rgba(2,6,23,.08);
      --radius:16px;
      --green-soft: rgba(47, 125, 98, .12);
    }

    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:"Poppins",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:var(--bg);
      color:var(--text);
      overflow-x:hidden;
    }

    /* ===== TOPBAR + NAVBAR ===== */
    .topbar{
      background: var(--green);
      min-height: 40px;
      display:flex;
      align-items:center;
      gap: 14px;
      padding: 8px 22px;
      color: rgba(255,255,255,.92);
      font-size: 12px;
      flex-wrap: wrap;
    }
    .topbar .left, .topbar .right{ display:flex; align-items:center; gap:12px; flex-wrap:wrap; }
    .topbar .right{ margin-left:auto; }

    .pill{
      display:flex; align-items:center; gap:8px;
      padding: 6px 10px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 999px;
      background: rgba(255,255,255,.08);
      white-space: nowrap;
    }

    .social{ display:flex; gap:10px; align-items:center; }
    .social a{
      width:28px; height:28px; display:grid; place-items:center;
      border-radius:999px;
      border:1px solid rgba(255,255,255,.18);
      background:rgba(255,255,255,.08);
      color:rgba(255,255,255,.95);
      text-decoration:none;
      transition:.15s;
      font-size:13px;
    }
    .social a:hover{ transform: translateY(-1px); background: rgba(255,255,255,.14); }

    .navbar{
      background: linear-gradient(180deg, var(--green), var(--green-2));
      padding: 16px 22px;
      display:flex;
      align-items:center;
      gap:18px;
      position:relative;
    }

    .brand{
      display:flex; align-items:center; gap:12px;
      color:#fff; font-weight:800; letter-spacing:.6px; text-transform:uppercase;
    }
    .brand .logo{
      width:44px; height:44px; border-radius:14px;
      display:grid; place-items:center;
      background: rgba(255,255,255,.10);
      border: 1px solid rgba(255,255,255,.18);
    }

    .menu{
      margin-left:auto;
      display:flex;
      gap:18px;
      align-items:center;
      flex-wrap: wrap;
    }
    .menu a{
      color: rgba(255,255,255,.92);
      text-decoration:none;
      font-size:13px;
      font-weight:600;
      padding: 8px 10px;
      border-radius:999px;
      transition:.15s;
    }
    .menu a:hover{ background: rgba(255,255,255,.12); }
    .menu a.active{ background: rgba(255,255,255,.18); }

    /* Mobile menu button */
    .menuBtn{
      margin-left:auto;
      display:none;
      border: 1px solid rgba(255,255,255,.20);
      background: rgba(255,255,255,.10);
      color:#fff;
      width:44px;
      height:44px;
      border-radius:14px;
      font-size:22px;
      cursor:pointer;
    }
    .menuBtn:hover{ background: rgba(255,255,255,.16); }

    /* Mobile menu drawer */
    .mobileMenuBack{
      position: fixed;
      inset: 0;
      background: rgba(2,6,23,.55);
      display:none;
      z-index: 70;
      padding: 10px;
    }
    .mobileMenu{
      position:absolute;
      top: 10px;
      right: 10px;
      width: min(340px, calc(100% - 20px));
      background: #fff;
      border-radius: 18px;
      overflow:hidden;
      box-shadow: 0 28px 90px rgba(0,0,0,.30);
    }
    .mobileMenuHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      padding: 14px 14px;
      border-bottom: 1px solid rgba(15,23,42,.10);
    }
    .mobileTitle{
      font-weight: 800;
      color: var(--text);
      letter-spacing: .2px;
    }
    .menuClose{
      border:none;
      background: rgba(15,23,42,.06);
      cursor:pointer;
      width: 40px;
      height: 40px;
      border-radius: 12px;
      font-size: 18px;
    }
    .mobileLinks{
      display:flex;
      flex-direction:column;
      padding: 12px;
      gap: 8px;
    }
    .mobileLinks a{
      text-decoration:none;
      color: var(--text);
      font-weight: 700;
      padding: 12px 12px;
      border-radius: 12px;
      background: rgba(15,23,42,.03);
    }
    .mobileLinks a.active{
      background: rgba(47,125,98,.12);
      color: var(--green-2);
      border: 1px solid rgba(47,125,98,.18);
    }

    /* ===== PAGE ===== */
    .container{
      max-width:1180px;
      margin:0 auto;
      padding:22px 18px 70px;
    }

    .pageHead{
      display:flex;
      align-items:flex-end;
      justify-content:space-between;
      gap:18px;
      margin-bottom:16px;
    }
    .titleWrap h1{
      margin:0;
      font-size: clamp(22px, 3.2vw, 34px);
      letter-spacing:.2px;
    }
    .titleWrap p{
      margin:8px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .badge{
      display:inline-flex;
      align-items:center;
      gap:8px;
      background: var(--green-soft);
      color: var(--green-2);
      border: 1px solid rgba(47,125,98,.18);
      padding: 10px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 12px;
      white-space: nowrap;
    }

    .filters{
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 14px;
      display:flex;
      gap:10px;
      flex-wrap: wrap;
      align-items:center;
      margin-bottom: 18px;
    }

    .pillBtn{
      border: 1px solid rgba(47,125,98,.25);
      background: #fff;
      color: var(--green-2);
      padding: 10px 12px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 12px;
      cursor:pointer;
      transition:.15s;
      user-select:none;
    }
    .pillBtn:hover{ transform: translateY(-1px); }
    .pillBtn.active{
      background: var(--green);
      border-color: var(--green);
      color: #fff;
    }

    .grid{
      display:grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-top: 10px;
    }

    .gcard{
      border-radius: var(--radius);
      overflow:hidden;
      position:relative;
      background:#fff;
      border: 1px solid var(--line);
      box-shadow: var(--shadow);
      cursor:pointer;
      min-height: 190px;
    }

    .gcard img{
      width:100%;
      height: 220px;
      object-fit: cover;
      display:block;
      transition: transform .25s ease;
    }
    .gcard:hover img{ transform: scale(1.04); }

    .overlay{
      position:absolute;
      inset:0;
      background: linear-gradient(180deg, transparent 40%, rgba(2,6,23,.65));
      opacity:0;
      transition: opacity .2s ease;
      display:flex;
      align-items:flex-end;
      padding: 12px;
    }
    .gcard:hover .overlay{ opacity:1; }

    .cap{
      color:#fff;
      font-weight:700;
      font-size: 13px;
      line-height: 1.2;
    }
    .cap small{
      display:block;
      margin-top: 4px;
      font-weight:600;
      opacity:.9;
    }

    /* Lightbox */
    .lightboxBack{
      position:fixed;
      inset:0;
      background: rgba(2,6,23,.75);
      display:none;
      align-items:center;
      justify-content:center;
      padding: 18px;
      z-index: 60;
    }
    .lightbox{
      width: min(980px, 100%);
      background:#0b1220;
      border-radius: 18px;
      overflow:hidden;
      box-shadow: 0 28px 90px rgba(0,0,0,.45);
    }
    .lightboxHead{
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap: 10px;
      padding: 12px 14px;
      background: rgba(255,255,255,.06);
      color:#fff;
    }
    .lightboxHead .t{
      font-weight:800;
      font-size: 13px;
    }
    .xbtn{
      border:none;
      cursor:pointer;
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: rgba(255,255,255,.10);
      color:#fff;
      font-size: 18px;
    }
    .xbtn:hover{ background: rgba(255,255,255,.16); }

    .lightboxImg{
      width:100%;
      max-height: 74vh;
      object-fit: contain;
      display:block;
      background:#0b1220;
    }

    /* Responsive */
    @media (max-width: 980px){
      .grid{ grid-template-columns: repeat(3, 1fr); }
    }

    /* ✅ MOBILE */
    @media (max-width: 720px){
      .topbar{ display:none !important; }     /* hide details on mobile */
      .menu{ display:none !important; }       /* hide desktop menu */
      .menuBtn{ display:inline-grid; place-items:center; } /* show hamburger */

      .navbar{ padding: 12px 12px; gap: 10px; }
      .brand .logo{ width: 40px; height: 40px; border-radius: 14px; }

      .pageHead{
        flex-direction: column;
        align-items:flex-start;
      }

      .grid{ grid-template-columns: repeat(2, 1fr); }
      .gcard img{ height: 180px; }

      .lightboxBack{ padding: 12px; }
      .lightboxImg{ max-height: 70vh; }
    }

    /* very small phones */
    @media (max-width: 420px){
      .grid{ grid-template-columns: 1fr; }
      .gcard img{ height: 200px; }
    }
  </style>
</head>

<body>
  <!-- TOPBAR -->
  <div class="topbar">
    <div class="left">
      <div class="pill">📞 +451236981</div>
      <div class="pill">✉️ example@gmail.com</div>
      <div class="pill">🕘 Mon–Fri: 8:00am–5:00pm</div>
    </div>
    <div class="right">
      <div class="social">
        <a href="#" title="Facebook">f</a>
        <a href="#" title="Twitter">t</a>
        <a href="#" title="Instagram">⌁</a>
      </div>
    </div>
  </div>

  <!-- NAVBAR -->
  <header class="navbar">
    <div class="brand">
      <div class="logo" aria-hidden="true">🌿</div>
      <span>BASIT</span>
    </div>

    <nav class="menu" aria-label="Primary">
      <a href="index.html">Home</a>
      <a href="services.html">Services</a>
      <a class="active" href="gallery.html">Gallery</a>
      <a href="specialist.html">Specialist</a>
      <a href="promo.html">Promos</a>
      <a href="log_in.html">Log in</a>
      <a href="Sign_up.html">Sign up</a>
    </nav>

    <!-- Mobile button -->
    <button class="menuBtn" id="menuBtn" aria-label="Open menu" aria-expanded="false" aria-controls="mobileMenu">☰</button>
  </header>

  <!-- Mobile Menu Drawer -->
  <div class="mobileMenuBack" id="mobileMenuBack" aria-hidden="true">
    <div class="mobileMenu" id="mobileMenu" role="dialog" aria-modal="true" aria-label="Mobile Menu">
      <div class="mobileMenuHead">
        <span class="mobileTitle">Menu</span>
        <button class="menuClose" id="menuClose" aria-label="Close menu">✕</button>
      </div>
      <nav class="mobileLinks" aria-label="Mobile Primary">
        <a href="index.html">Home</a>
        <a href="services.html">Services</a>
        <a class="active" href="gallery.html">Gallery</a>
        <a href="specialist.html">Specialist</a>
        <a href="promo.html">Promos</a>
        <a href="log_in.html">Log in</a>
        <a href="Sign_up.html">Sign up</a>
      </nav>
    </div>
  </div>

  <!-- PAGE -->
  <div class="container">
    <div class="pageHead">
      <div class="titleWrap">
        <h1>Gallery</h1>
        <p>Browse our salon works, interior, and spa moments.</p>
      </div>
      <div class="badge">
        <span>●</span>
        <span id="countText">0 photos</span>
      </div>
    </div>

    <div class="filters" id="filterRow"></div>
    <div class="grid" id="grid"></div>
  </div>

  <!-- LIGHTBOX -->
  <div class="lightboxBack" id="lightboxBack">
    <div class="lightbox">
      <div class="lightboxHead">
        <div class="t" id="lbTitle">Photo</div>
        <button class="xbtn" id="lbClose" aria-label="Close">✕</button>
      </div>
      <img id="lbImg" class="lightboxImg" alt="Preview" />
    </div>
  </div>

  <script>
    // ===== Mobile menu toggle =====
    const menuBtn = document.getElementById("menuBtn");
    const mobileMenuBack = document.getElementById("mobileMenuBack");
    const menuClose = document.getElementById("menuClose");

    function openMenu(){
      mobileMenuBack.style.display = "block";
      menuBtn.setAttribute("aria-expanded", "true");
      mobileMenuBack.setAttribute("aria-hidden", "false");
      document.body.style.overflow = "hidden";
    }
    function closeMenu(){
      mobileMenuBack.style.display = "none";
      menuBtn.setAttribute("aria-expanded", "false");
      mobileMenuBack.setAttribute("aria-hidden", "true");
      document.body.style.overflow = "";
    }

    menuBtn?.addEventListener("click", openMenu);
    menuClose?.addEventListener("click", closeMenu);
    mobileMenuBack?.addEventListener("click", (e) => {
      if(e.target === mobileMenuBack) closeMenu();
    });
    document.addEventListener("keydown", (e) => {
      if(e.key === "Escape") closeMenu();
    });

    // ===== Gallery logic =====
    let photos = JSON.parse(localStorage.getItem("gallery")) || [
      { title:"Hair Styling", category:"Hair", url:"https://images.unsplash.com/photo-1522335789203-aabd1fc54bc9?auto=format&fit=crop&w=1400&q=80" },
      { title:"Hair Treatment", category:"Hair", url:"https://images.unsplash.com/photo-1527799820374-dcf8f2f4c0bd?auto=format&fit=crop&w=1400&q=80" },

      { title:"Manicure Session", category:"Nails", url:"https://images.unsplash.com/photo-1604654894610-df63bc536371?auto=format&fit=crop&w=1400&q=80" },
      { title:"Pedicure Care", category:"Nails", url:"https://images.unsplash.com/photo-1588776814546-1ffcf47267a5?auto=format&fit=crop&w=1400&q=80" },

      { title:"Facial Treatment", category:"Spa", url:"https://images.unsplash.com/photo-1515377905703-c4788e51af15?auto=format&fit=crop&w=1400&q=80" },
      { title:"Massage Room", category:"Spa", url:"https://images.unsplash.com/photo-1552693673-1bf958298935?auto=format&fit=crop&w=1400&q=80" },

      { title:"Salon Interior", category:"Interior", url:"https://images.unsplash.com/photo-1521590832167-7bcbfaa6381f?auto=format&fit=crop&w=1400&q=80" },
      { title:"Reception Area", category:"Interior", url:"https://images.unsplash.com/photo-1556228453-efd6c1ff04f6?auto=format&fit=crop&w=1400&q=80" },

      { title:"Beauty Products", category:"Products", url:"https://images.unsplash.com/photo-1526947425960-945c6e72858f?auto=format&fit=crop&w=1400&q=80" },
      { title:"Makeup Set", category:"Products", url:"https://images.unsplash.com/photo-1512496015851-a90fb38ba796?auto=format&fit=crop&w=1400&q=80" },
    ];

let categories = JSON.parse(localStorage.getItem("categories")) || [
"Hair",
"Nails",
"Spa",
"Interior",
"Products"
];

// Add "All" button at the start
categories = ["All", ...categories];
    const grid = document.getElementById("grid");
    const filterRow = document.getElementById("filterRow");
    const countText = document.getElementById("countText");

    const lightboxBack = document.getElementById("lightboxBack");
    const lbImg = document.getElementById("lbImg");
    const lbTitle = document.getElementById("lbTitle");
    const lbClose = document.getElementById("lbClose");

    let active = "All";

    function buildFilters(){
      filterRow.innerHTML = "";
      categories.forEach(c=>{
        const b = document.createElement("button");
        b.type="button";
        b.className = "pillBtn" + (c===active ? " active" : "");
        b.textContent = c;
        b.onclick = ()=>{ active=c; buildFilters(); render(); };
        filterRow.appendChild(b);
      });
    }

    function card(p){
      return `
        <div class="gcard" data-url="${p.url}" data-title="${p.title}">
          <img src="${p.url}" alt="${p.title}">
          <div class="overlay">
            <div class="cap">
              ${p.title}
              <small>${p.category}</small>
            </div>
          </div>
        </div>
      `;
    }

    function render(){
      const list = photos.filter(p => active==="All" || p.category===active);
      countText.textContent = `${list.length} photo${list.length!==1 ? "s" : ""}`;

      grid.innerHTML = list.map(card).join("");

      document.querySelectorAll(".gcard").forEach(el=>{
        el.addEventListener("click", ()=>{
          const url = el.getAttribute("data-url");
          const title = el.getAttribute("data-title");
          lbImg.src = url;
          lbTitle.textContent = title;
          lightboxBack.style.display="flex";
          document.body.style.overflow = "hidden";
        });
      });
    }

    function closeLightbox(){
      lightboxBack.style.display="none";
      lbImg.src = "";
      document.body.style.overflow = "";
    }

    lbClose.onclick = closeLightbox;
    lightboxBack.addEventListener("click",(e)=>{ if(e.target===lightboxBack) closeLightbox(); });
    document.addEventListener("keydown", (e) => { if(e.key === "Escape") closeLightbox(); });

    buildFilters();
    render();
  </script>
</body>
</html>
