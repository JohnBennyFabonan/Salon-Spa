<style>

--green:#2f7d62;
--green-2:#256a52;

--card:#ffffff;
--text:#0f172a;
--muted:#64748b;

--green-soft: rgba(47,125,98,.12);

*{box-sizing:border-box}

body{
margin:0;
font-family:"Poppins",sans-serif;
background:var(--bg);

/* ===== TOPBAR ===== */

}

.topbar .right{margin-left:auto}

.pill{

gap:8px;

border:1px solid rgba(255,255,255,.18);

/* ===== NAVBAR ===== */

.navbar{
background: linear-gradient(180deg,var(--green),var(--green-2));

display:flex;
align-items:center;

}

.brand{
display:flex;
align-items:center;
gap:12px;
color:white;
font-weight:800;
letter-spacing:.6px;
text-transform:uppercase;
}

.logo{
width:44px;
height:44px;
border-radius:14px;
display:grid;
place-items:center;
background:rgba(255,255,255,.10);
border:1px solid rgba(255,255,255,.18);
}

.menu{
margin-left:auto;
display:flex;
gap:18px;
align-items:center;
}

.menu a{
color:rgba(255,255,255,.92);
text-decoration:none;
font-size:13px;
font-weight:600;
padding:8px 10px;
border-radius:999px;
}

.menu a:hover{
background:rgba(255,255,255,.12);
}

/* ===== PAGE ===== */

.container{
max-width:900px;
margin:auto;
padding:40px 20px;
}

.card{
background:var(--card);
border:1px solid var(--line);
border-radius:var(--radius);
padding:40px;
box-shadow:var(--shadow);
}

.successIcon{
font-size:60px;
text-align:center;
margin-bottom:10px;
}

h1{
text-align:center;
margin:0;
}

.subtitle{
text-align:center;
color:var(--muted);
margin:10px 0 30px;
}

.row{
display:flex;
justify-content:space-between;
padding:12px 0;
border-bottom:1px solid #eee;
font-size:14px;
}

.row:last-child{
border:none;
}

.label{
color:var(--muted);
font-weight:600;
}

.value{
font-weight:800;
}

.total{
margin-top:20px;
padding:15px;
background:var(--green-soft);
border-radius:12px;
display:flex;
justify-content:space-between;
font-weight:800;
}

.actions{
margin-top:25px;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.btn{
flex:1;
padding:12px;
border:none;
border-radius:12px;
font-weight:800;
cursor:pointer;
}

.primary{
background:var(--green);
color:white;
}

.primary:hover{
background:var(--green-2);
}

.outline{
background:white;
border:2px solid var(--green);
color:var(--green);
}

/* ===== MOBILE ===== */

@media(max-width:720px){

.menu{display:none}

.row{
flex-direction:column;
gap:4px;
}

}

</style>

<body>

<div class="topbar">
<div class="left">
<div class="pill">📞 0936 411 6193</div>
<div class="pill">✉️ trinettebless@gmail.com</div>

</div>

<a href="gallery.html">Gallery</a>

<!-- PAGE CONTENT -->
<div class="container">

<div class="card">

<div class="successIcon">✅</div>

<h1>Booking Confirmed</h1>

<p class="subtitle">
Your appointment has been successfully scheduled.
</p>

<div class="row">
<div class="label">Booking ID</div>
<div class="value" id="bookingID"></div>
</div>

<div class="row">
<div class="label">Service</div>
<div class="value" id="service"></div>
</div>

<div class="row">
<div class="label">Duration</div>
<div class="value" id="duration"></div>
</div>

<div class="row">
<div class="label">Date</div>
<div class="value" id="date"></div>
</div>

<div class="row">
<div class="label">Time</div>
<div class="value" id="time"></div>
</div>

<div class="row">
<div class="label">Specialist</div>
<div class="value" id="staff"></div>
</div>

<div class="total">
<span>Total</span>
<span id="price"></span>
</div>

<div class="actions">

<button class="btn primary" onclick="confirmBooking()">
Confirm Booking
</button>

<button class="btn outline" onclick="window.location='booking.html'">
Book Another
</button>

</div>

</div>

</div>


<script>

/* GET PENDING BOOKING (NOT YET SAVED) */

const pending = JSON.parse(localStorage.getItem("pendingBooking"));

function peso(n){
return new Intl.NumberFormat("en-PH",{
style:"currency",
currency:"PHP",
minimumFractionDigits:0
}).format(n || 0);
}

if(pending){

document.getElementById("bookingID").innerText = pending.id || "-";

let serviceNames = "-";
let serviceDurations = "-";

if(Array.isArray(pending.services) && pending.services.length){

serviceNames = pending.services.map(s => s.name || "-").join(", ");
serviceDurations = pending.services.map(s => s.duration || "-").join(", ");

}

document.getElementById("service").innerText = serviceNames;
document.getElementById("duration").innerText = serviceDurations;

document.getElementById("date").innerText = pending.date || "-";
document.getElementById("time").innerText = pending.time || "-";

document.getElementById("staff").innerText = pending.staff || "No preference";

document.getElementById("price").innerText = peso(pending.totalPrice);

}


/* CONFIRM BOOKING (SAVE TO DATABASE / LOCAL STORAGE) */

function confirmBooking(){

const pending = JSON.parse(localStorage.getItem("pendingBooking"));

if(!pending) return;

const bookings = JSON.parse(localStorage.getItem("salonBookings") || "[]");

bookings.unshift(pending);

localStorage.setItem("salonBookings", JSON.stringify(bookings));

localStorage.removeItem("pendingBooking");

/* REDIRECT AFTER CONFIRM */
window.location.href = "customer_dashboard.html";

}

</script>
