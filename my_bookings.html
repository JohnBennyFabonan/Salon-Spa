<!doctype html>
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>My Bookings | Salon & Spa</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;800&display=swap" rel="stylesheet">

<style>

:root{
--green:#2f7d62;
--green2:#256a52;
--bg:#f4fbf7;
}

body{
margin:0;
font-family:Poppins;
background:var(--bg);
}

.container{
max-width:1100px;
margin:auto;
padding:30px 20px;
}

h1{
margin-bottom:25px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:18px;
}

.card{
background:white;
border-radius:16px;
padding:18px;
box-shadow:0 10px 30px rgba(0,0,0,0.05);
border:1px solid rgba(0,0,0,0.05);
}

.row{
display:flex;
justify-content:space-between;
margin:6px 0;
font-size:14px;
}

.label{
color:#64748b;
font-weight:600;
}

.value{
font-weight:700;
}

.price{
font-size:18px;
font-weight:800;
color:var(--green2);
margin-top:10px;
}

.status{
background:#e7f7ef;
color:var(--green2);
font-size:12px;
padding:6px 10px;
border-radius:20px;
display:inline-block;
margin-top:10px;
}

.actions{
margin-top:15px;
display:flex;
gap:10px;
}

button{
border:none;
padding:8px 12px;
border-radius:8px;
cursor:pointer;
font-size:12px;
font-weight:600;
}

.cancel{
background:#fee2e2;
color:#b91c1c;
}

.view{
background:#d1fae5;
color:#065f46;
}

.empty{
text-align:center;
margin-top:80px;
color:#64748b;
}

</style>
</head>

<body>

<div class="container">

<h1>My Bookings</h1>

<div class="grid" id="bookingGrid"></div>

<div class="empty" id="emptyMsg" style="display:none">
No bookings yet.
</div>

</div>

<script>

const bookings = JSON.parse(localStorage.getItem("salonBookings") || "[]");

const grid = document.getElementById("bookingGrid");
const emptyMsg = document.getElementById("emptyMsg");

if(bookings.length === 0){
emptyMsg.style.display="block";
}

function peso(n){
return "₱"+Number(n).toLocaleString("en-PH");
}

bookings.forEach((b,i)=>{

const services = b.services.map(s=>s.name).join(", ");

const card = document.createElement("div");
card.className="card";

card.innerHTML=`

<div class="row">
<span class="label">Booking ID</span>
<span class="value">${b.id}</span>
</div>

<div class="row">
<span class="label">Service</span>
<span class="value">${services}</span>
</div>

<div class="row">
<span class="label">Date</span>
<span class="value">${b.date}</span>
</div>

<div class="row">
<span class="label">Time</span>
<span class="value">${b.time}</span>
</div>

<div class="row">
<span class="label">Specialist</span>
<span class="value">${b.staff}</span>
</div>

<div class="price">
Total: ${peso(b.totalPrice)}
</div>

<div class="row">
<span class="label">Downpayment</span>
<span class="value">${peso(b.downpayment)}</span>
</div>

<div class="row">
<span class="label">Remaining</span>
<span class="value">${peso(b.remaining)}</span>
</div>

<div class="status">Pending Approval</div>

<div class="actions">
<button class="view">View Details</button>
<button class="cancel">Cancel</button>
</div>

`;

grid.appendChild(card);

});

</script>

</body>
</html>
